body:
  text: 四沙門果謂須陀洹果斯陀含果阿那含果阿羅漢果問曰何故作此論答曰或有説沙門果惟是無為如毗婆闍婆提説問曰彼何故作是説耶答曰彼依佛經佛經説告諸比丘我今當説沙門沙門果沙門人云何名沙門答曰八聖道名沙門云何名沙門果答曰須陀洹果乃至阿羅漢果何者是須陀洹果答曰永斷三結是也何者是斯陀含果答曰永斷三結薄愛恚癡是也何者是阿那含果答曰永斷五下分結是也何者是阿羅漢果答曰永斷愛慢癡一切結是也何者是沙門人答曰成就如是等法名沙門人因此經故説沙門果惟是無為為止如是説者意亦明沙門果是有為無為故若沙門果惟是無為非有為者違於佛經經説有四向有住四果住果者住有為沙門果不住無為沙門果問曰是時亦住斷中如施設經説彼住於斷不求勝法不得者得不證者證不解者解答曰言住斷者非如乘象馬住象馬上但於斷法不退不進故言住斷世尊經亦有一向説有為沙門果者如説比丘當知於此五根令增上猛利通達滿足當得俱解脫阿羅漢果轉不如者得慧解脫乃至堅信問曰若沙門果是有為無為者佛經云何通答曰沙門果是有為無為佛經惟説無為問曰何故佛經惟説無為沙門果答曰佛經惟説沙門果不説沙門道是沙門亦是沙門果復次此經惟説婆羅門果不説婆羅門道是婆羅門亦是婆羅門果復次佛經説梵行道是梵行亦是梵行果復次佛經説果更無有果道是果更有果復次佛經説離更無有離道是離更有離以是事故欲止他義欲顯已義乃至廣説而作此論四沙門果須陀洹果乃至阿羅漢果云何須陀洹果答曰如波伽羅那説須陀洹果有二種有為無為云何有為須陀洹果答曰證須陀洹果時已得今得當得諸學法已得是過去今得是現在當得是未來是名有為須陀洹果云何無為須陀洹果答曰證須陀洹果時諸結斷已得今得當得廣説如上問曰道是有為墮世已得今得當得此事可爾斷是無為不墮於世已得今得當得云何可爾答曰波伽羅那經應如是説諸結斷今得今解今證而不説者有何意耶答曰此説在身中得已得者説過去身得今得者説現在身得當得者説未來身得如須陀洹果斯陀含果阿那含果説亦如是云何阿羅漢果答曰阿羅漢果有二種謂有為無為云何有為阿羅漢果答曰證阿羅漢果時已得今得當得諸無學法廣説如上施設經説云何須陀洹果答曰須陀洹果有二種謂有為無為云何有為須陀洹果答曰彼果得彼得得果得者謂須陀洹果得得得者謂彼得得以得故名果以得得故名成就諸學根學力學戒學善根學八法如是等諸學法名有為須陀洹果云何無為須陀洹果答曰永斷三結如是等諸結法斷八十八使斷如是等諸使法斷是名無為須陀洹果云何斯陀含果答曰斯陀含果有二種謂有為無為廣説如上此中差別者漸斷愛恚癡及漸斷愛恚法云何阿那含果答曰阿那含果有二種謂有為無為有為阿那含果如上説無為阿那含果者永斷五下分結永斷如是等結法永斷九十二使永斷如是等使法是名無為阿那含果云何阿羅漢果答曰阿羅漢果有二種謂有為無為云何有為阿羅漢果答曰阿羅漢果得及彼得得果得者謂阿羅漢得得得者謂彼得得以得故名果以得得故名成就諸無學根無學力無學戒無學善根無學十種法如是等諸無學法是名有為阿羅漢果云何無為阿羅漢果答曰永斷愛慢癡一切煩惱出一切趣斷一切生死道滅三種火已過四流摧滅諸慢離於渴愛破散巢窟無上究竟無上寂滅無上安樂愛盡無欲涅槃是名無為阿羅漢果此是沙門果體性乃至廣説已説體性所以今當説何故名沙門果沙門果是何義答曰聖道名沙門是其果故名沙門果問曰聖道名沙門彼果是沙門果者見道中八忍名沙門八智是有為沙門果八種結斷是無為沙門果離欲愛時九無礙道名沙門九解脫道是有為沙門果九種結斷是無為沙門果乃至離非想非非想處欲亦如是是則有八十九有為沙門果八十九無為沙門果以世分別八十九在過去八十九在未來八十九在現在波伽羅那經説云何果法答曰一切有為及數滅隨有幾許聖道剎那有爾許有為沙門果隨有幾許解脫法有爾許沙門果若以剎那在身分別則有無量無邊沙門果何故佛經惟説四沙門果答曰或有説者此是如來有餘略要為受化者而作是説尊者波奢説曰佛決定知法相亦知勢用餘人所不知若法次第相續立沙門果彼次第相續説沙門果復次是時易見易施設謂此是須陀洹果乃至阿羅漢果果中間不易見不易施設復次行者是時於果生大悅適譬如農夫於六月中修治田業後獲子實積聚場上心大悅適彼亦如是復次是時有三事故一得未曾得道二捨曾得道三斷煩惱同於一味復次是時有五事一得未曾得道二捨曾得道三斷煩惱同於一味四頓得八智五修十六行復次是時是止息處復次是時斷結事事成道方便方便成果中間斷結事未成道方便未成復次是時容廣修道果中間不容廣修道復次行者是時善知功德過惡知功德者是道道果知過惡者是生死法復次行者是時善取相貌如人道中行時不能善取四方相貌若坐一處則能善取四方相貌彼亦如是復次行者是時有隨從知見猶如有人於村落中間為人所劫無有隨從知見者若在村落為人所劫多有隨從知見者復次行者是時先廣修方便道立足處牢固須陀洹果廣修方便道者先為解脫故修施持戒聞慧思慧修慧暖頂忍世第一法見道中十五心頃是也斯陀含果廣修方便道者如上説諸善復更有未曾有者離欲界方便道六無礙道五解脫道是也阿那含果廣修方便道者如上説諸善復更有未曾有者離欲愛時方便道三無礙道二解脫道是也阿羅漢果廣修方便道者如上説諸善復更有未曾有者離初禪欲時方便道九無礙道九解脫道乃至離無所有處欲説亦如是離非想非非想處欲時方便道九無礙道八解脫道是也復次行者是時斷一切生分止一切生分須陀洹除欲界七生分色無色界一一生處除一生分餘一切生分得非數滅斯陀含除欲界二生分色無色界一一生處除一生分餘一切生分得非數滅阿那含色無色界一一生處除一生分餘一切生分得非數滅阿羅漢一切生分得非數滅復次行者是時頓證三界見道修道所斷煩惱須陀洹頓證三界見道所斷煩惱斯陀含頓證三界見道所斷煩惱及欲界修道所斷六種煩惱阿那含頓證三界見道所斷煩惱及欲界修道所斷九種煩惱阿羅漢頓證三界見道修道所斷煩惱復次根本沙門果退者不命終果中間退者命終復次對五趣故説四沙門果須陀洹果對地獄畜生餓鬼道斯陀含果對人道少分阿那含果畢竟對人道阿羅漢果對於天道復次對四生故須陀洹果對濕生卵生斯陀含果對胎生少分阿那含果畢竟對胎生阿羅漢果對化生復次對二種思故一斷善根思二造五逆業思須陀洹果對斷善根思斯陀含果對造五逆業思阿那含果對彼業報阿羅漢果對彼受報陰所以者何受報必依陰故復次對三三法故須陀洹果對三結斯陀含果對漸薄三不善根及欲漏阿那含果畢竟對三不善根及欲漏阿羅漢果對有漏無明漏復次對四流故須陀洹果對見流斯陀含果對欲流少分阿那含果畢竟對欲流阿羅漢果對有流無明流對扼亦如是復次對四取故須陀洹果對見取取戒取取斯陀含果對欲取少分阿那含果畢竟對欲取阿羅漢果對我語取復次對三五法故須陀洹果對疑蓋下分中三結斯陀含果對餘蓋下分中二結少分阿那含果畢竟對餘蓋下分中二結阿羅漢果對上分結復次對諸見及六愛身故須陀洹果對五見斯陀含果對鼻舌觸生愛身少分阿那含果畢竟對鼻舌觸生愛身阿羅漢果對餘愛身復次對七使故須陀洹果對見使疑使斯陀含果對欲愛使恚使少分阿那含果畢竟對欲愛使恚使阿羅漢果對餘使復次對九結故須陀洹果對見結取結疑結斯陀含果對恚結嫉結慳結少分阿那含果畢竟對恚結嫉結慳結阿羅漢果對餘結復次對九十八使故須陀洹果對三界見道所斷使斯陀含果對欲界修道所斷少分阿那含果畢竟對欲界修道所斷阿羅漢果對色無色界修道所斷問曰何故離欲愛時立二沙門果謂斯陀含果阿那含果離色無色界愛時立一沙門果謂阿羅漢果尊者波奢説曰皆以離三界愛故立四沙門果以斷三界見道所斷結故立須陀洹果以斷三界見道所斷結及欲界修道所斷六種結故立斯陀含果以斷三界見道所斷結及欲界修道所斷九種結故立阿那含果以斷三界見道修道所斷結故立阿羅漢果復次欲界是不定界非修地非定地非離欲地離彼欲時立二沙門果色無色界是修地定地離欲地離彼愛時立一沙門果復次欲界難斷難壞難過離彼欲時立二沙門果色無色界與此相違離彼愛時立一沙門果復次欲界多重過患離彼欲時立二沙門果色無色界與此相違離彼欲時立一沙門果復次欲界是駛流難度離彼欲時立二沙門果猶如有人入山間大河其水深廣駛疾為其所漂處處止息然後乃度如是欲界是流漂界如經説村主當知夫流漂者是上妙五欲離彼欲時立二沙門果色無色界與此相違離彼欲時立一沙門果復次欲界諸煩惱重所作業亦重離彼欲時立二沙門果譬如負重擔人上嶮難山必數止息然後乃到平地雖復重擔猶能遠有所至如是欲界諸煩惱重所作業亦重離彼欲時立二沙門果色無色界與此相違離彼欲時立一沙門果復次欲界是淤泥糞穢界離彼欲時立二沙門果色無色界與上相違離彼愛時立一沙門果譬如糞穢聚上立堂舍人所不樂如是色無色界雖復妙好以下有不淨欲界故賢聖不樂是故尊者僧伽婆修作如是説欲界多諸過惡謂父母兄弟姊妹妻子死喪亡失財物截劓耳鼻頭手等苦頭痛等四百四病若離此處欲時立二沙門果亦無有過復次以欲界有男身女身離彼欲時立二沙門果色無色界唯有男身離彼欲時立一沙門果復次欲界有男根女根離彼欲時立二沙門果色無色界無男女根離彼欲時立一沙門果復次欲界有二種煩惱謂不善無記離彼欲時立二沙門果色無色界有一種煩惱謂無記離彼欲時立一沙門果如不善無記有報無報生二果一果與無慚無愧相應不與無慚無愧相應當知亦如是復次以欲界有憂根苦根無慚無愧嫉慳飲食愛淫欲愛諸蓋五欲如是等過離彼欲時立二沙門果色無色界無如是等過離彼欲時立一沙門果問曰聖道沙門是彼果故名沙門果若以無漏道得沙門果者可爾若以世俗道得斯陀含果阿那含果云何可爾答曰如以無漏道離欲愛次第立斯陀含果阿那含果聖人以世俗道離欲愛亦次第立斯陀含果阿那含果尊者僧伽婆修説曰以世俗道斷結無漏道於未來修二沙門果是彼道果不應作如是説所以者何未來道不能有所作復有説者以世俗道現在前斷結無漏道得一切時生無有斷絶二沙門果即是彼果不應作是説所以者何非是彼果復有説者金剛喻定是實義沙門通證三界見道修道所斷煩惱解脫得即是彼果評曰以從多分故是沙門果聖道果多非有漏道果多若以世俗道得斯陀含果三界見道所斷結斷是沙門果欲界繫修道所斷六種結盡是世俗道果若以世俗道得阿那含果三界見道所斷結斷是沙門果欲界繫修道所斷九種結斷是世俗道果是故當知從多分故名沙門果問曰四沙門果幾是假名幾是實義答曰二是假名謂斯陀含果阿那含果二是實義謂須陀洹果阿羅漢果問曰何故二是假名二是實義答曰以此二果或以世俗道得或以無漏道得須陀洹果阿羅漢果悉以無漏道得故復次斯陀含果阿那含果以世俗假名道得故果亦是假名須陀洹果阿羅漢果不以假名道得故名實義復次以世俗道無漏道共得故名假名復有説者二是實義謂阿那含果阿羅漢果所以者何佛辟支佛聲聞皆得此二果故問曰外物或得果多或得果少斷法不爾云何言果答曰以方便故言果行者住於高山間靜房舍於諸飲食資生之物皆悉知量受一七六七法頂安禪鎮行禪毱法杖堅強精進生如是法是時其師深慰勞言善哉善哉汝行正方便今得此果譬如農夫於六月中修治田業後獲子實聚置場上諸舊農夫慰勞新者善哉善哉汝六月勞勤今獲此果彼亦如是問曰此四沙門果幾是禪果幾是無色定果幾是根本禪果幾是禪邊果幾是根本無色定果幾是無色定邊果幾是見道果幾是修道果幾是忍果幾是智果幾是法智果幾是比智果幾是法智分果幾是比智分果幾是有漏道果幾是無漏道果幾是禪果者答曰四是禪及眷屬果幾是無色定果者答曰一是無色定果謂阿羅漢果幾是根本禪果者答曰二謂阿那含果阿羅漢果幾是禪邊果者答曰四謂初禪邊非餘禪邊幾是根本無色定果者答曰一謂阿羅漢果幾是無色定邊果者答曰無幾是見道果者答曰三除阿羅漢果幾是修道果者答曰三除須陀洹果幾是忍果者答曰三除阿羅漢果幾是智果者答曰三除須陀洹果幾是法智果者答曰三除須陀洹果幾是比智果者答曰一謂阿羅漢果幾是法智分果者答曰三除須陀洹果幾是比智分果者答曰四幾是世俗道果者答曰二謂斯陀含果阿那含果幾是無漏道果者答曰四佛經説摩伽陀國毗提希子阿闍貰王往詣佛所頭面禮足在一面坐白佛言世尊為設有現法沙門果可得不耶佛言可得佛告王言我今問汝隨汝意答於意云何若王給侍及諸奴僕不自在者見於大王升高殿堂五樂自娛受諸快樂便作是念我亦是人然王多修福故升高殿堂五樂自娛受諸快樂我等亦應修諸福業信家非家剃除鬚髮捨家出家彼於後時即便出家修行十善不殺乃至正見王餘使人於外見之若來白王作是言大王侍使奴僕不自在者今已剃除鬚髮出家學道修行十善王今應當將還如前策使王如其言還將來耶答曰不也我應往見親近恭敬如彼本日禮敬迎送於我我今亦應禮敬迎送還恭敬之盡其形壽施與衣服飲食房舍臥具資生之物大王當知如此之事豈非是現法沙門果耶王白佛言實如聖教問曰沙門果有四今者何故説五沙門果耶答曰此是出家近功用果如師子吼經復説此處有初沙門第二沙門第三沙門第四沙門非餘外道沙門婆羅門空行之者汝等應當如是作師子吼此處有初沙門乃至有第四沙門初沙門者是須陀洹第二沙門是斯陀含第三沙門是阿那含第四沙門是阿羅漢尊者波奢説曰佛世尊先説次第根本法初沙門者是阿羅漢第二沙門者是阿那含第三沙門者是斯陀含第四沙門者是須陀洹須跋陀羅經復説須跋陀羅當知此處若有八聖道便有初沙門果乃至第四沙門果或有説者此中説四向是沙門初沙門者是向須陀洹果證第二沙門者是向斯陀含果證第三沙門者是向阿那含果證第四沙門者是向阿羅漢果證尊者波奢説曰此中説四向四果是沙門如説須跋陀羅當知若有八聖道處當知説向便有初沙門乃至第四沙門當知説果純陀經復説有四沙門無第五沙門四沙門者一勝道沙門二説道沙門三道命沙門四過道沙門勝道沙門者是佛世尊所以者何以佛有自然智故辟支佛亦爾説道沙門者如舍利弗等所以者何我隨佛轉法輪故餘無學聲聞亦爾道命沙門者阿難是所以者何彼是學亦令他住學法多聞持戒具足餘學聲聞亦爾過道沙門者如摩訶羅偷盜者是問曰師子吼經所説沙門須跋陀羅經所説沙門純陀經所説沙門有何差別答曰或有説者師子吼經説住果沙門須跋陀羅經説住向沙門純陀經説在向住果沙門復有説者師子吼經須跋陀羅經説住果沙門純陀經説一切沙門復有説者師子吼經須跋陀羅經説聖人沙門純陀經説聖人凡夫沙門復有説者師子吼經須跋陀羅經説學無學沙門純陀經説學無學非學非無學沙門復有説者師子吼經須跋陀羅經説淨戒沙門純陀經説淨不淨戒沙門復有説者如師子吼經所説沙門須跋陀羅經純陀經所説亦爾如須跋陀羅經所説沙門師子吼經純陀經所説亦爾如純陀經所説沙門師子吼經須跋陀羅經所説亦爾問曰若然者此説云何通如説作如此師子吼我此衆中有初沙門乃至第四沙門世尊亦説惡戒破諸威儀離於白法之人而師子吼耶答曰亦説所以者何彼雖破戒而不破見雖破方便不破期心若他人問此事為好為不好耶答言不好是沙門所應作所不應作耶答曰不應作此事為有報為無報耶答言有報此報為是可愛為惡道中受為人天中受答言惡道中受為自身受為他身受答言自身受非他身受為是師過為是經過答言非是師過答言亦非經過是我之過如是正見於因緣中不愚則九十六種道中所無是故世尊於此衆中作師子吼佛經説世有三人名多有所作計其所作不易可報若盡形壽衣服飲食隨病醫藥而供養之亦不能報云何為三有人為他説法令信家非家捨家出家是名初人多有所作不易可報次復有人為他説法令他能知集法皆是滅相於諸法中遠塵離垢得法眼淨是人所作不易可報乃至廣説次復有人為他説法能令他人盡有漏成無漏心得解脫慧得解脫自身作證是人所作不易可報乃至廣説問曰如教人令受優婆塞戒是人亦名多有所作此中何故不説耶答曰應説而不説者當知此説有餘復次以出家戒是因果故出家戒是比丘戒因是優婆塞戒果復次若教他出家則名教他入假名法入法有二種一者入假名法二者入實義法入假名法者剃除鬚髮出家是也入實義法者住世第一法入苦法忍是也復次若教他出家則令他人脫多役驅使等種種諸苦復次若教他出家則救濟他人雖於現苦不久亦當得離生老病死苦復次若教他出家則令他人得現法樂不久亦當得自在樂復次若教他出家則假名佛出世間不久亦當實義佛出世間復次若教他出家則教他人三戒三身三學三修三淨三道三地三根三種菩提復次若教他出家則得決定解脫道如説若能剃除鬚髮出家者此人必當決定知見四真諦法復次若教他出家則教他人令身少事身少事能生心少事身遠心遠身淨心淨身好心好身端正心端正亦如是復次若教他出家則教他剃髮著袈裟剃髮則能生牟尼著袈裟則能去離惡復次若教他出家則令他人得無盡業無盡財無過業無過財復次若教他出家則令他人盡形壽持戒淨修梵行傷佉諸利傷佉諸利是何義耶尊者和須蜜説曰有仙人一名傷佉二名諸利淨修梵行威儀具足在家之人所不能行如畫珂貝上非風吹日曝所能壞滅在家之人修行梵行不能如是如畫貝上分明了了在家之人修行梵行不能如是如阿那含猶如妻子畜衆生數非衆生數物凡夫聖人無有差別復次若教他出家則示他人帝釋轉輪聖王閻羅王所欲之事問曰何故教他出家置二果唯説須陀洹果阿羅漢果答曰已説在此義中所以者何遠塵離垢得法眼淨三果可爾具縛人漸離欲人永離欲人得正決定悉名遠塵離垢得法眼淨復次現始終故始是須陀洹果終是阿羅漢果如始終始入已度方便畢竟説亦如是復次此二果一向無漏道得非有漏道二果無漏有漏道得如有漏無漏道解脫道繫縛道亦如是復次此果俱過非想非非想處人得須陀洹果過非想非非想處見道所斷結乃得阿羅漢果過非想非非想處修道所斷結乃得復次此現門現略所有沙門果或以見道得或以修道得若説須陀洹果當知已説見道得者若説阿羅漢果當知已説修道得者如見道修道見地修地未知欲知根知根説亦如是復次有沙門果或因見道所斷結盡而立或因修道所斷結盡而立如見道所斷緣無所有煩惱緣所有煩惱忍對治煩惱智對治煩惱亦如是復次已説在此義中所以者何以必得故若得須陀洹果必得斯陀含果若得阿羅漢果必由阿那含果須陀洹成就諸學法彼法須陀洹果攝耶問曰何故作此論答曰先説無為沙門果今欲説有為無為沙門果故而作此論須陀洹成就諸學法彼法須陀洹果攝耶答曰或攝或不攝云何攝答曰有為須陀洹果得已不失得者信解脫得信解脫諸根見到得見到諸根不失者信解脫不轉根作見到不失信解脫諸根云何不攝須陀洹前進得勝妙無漏諸根前進者方便道六無礙道五解脫道如是等前進道所有學法須陀洹成就彼非須陀洹果攝所以者何前進道非果所攝設法須陀洹果攝彼法是學耶答曰或是學或是非學非無學云何是學答曰有為須陀洹果謂道比智及眷屬云何是非學非無學答曰無為須陀洹果謂三界見道所斷結斷斯陀含成就諸學法彼法斯陀含果攝耶答曰或攝或不攝云何攝答曰有為斯陀含果得已不失得者信解脫得信解脫諸根見到得見到諸根不失者信解脫不轉根作見到不失信解脫諸根云何不攝斯陀含前進得勝妙無漏諸根前進者方便道三無礙道二解脫道如是等前進道所有學法斯陀含成就彼非斯陀含果攝所以者何前進道非果所攝設法斯陀含果攝彼法是學耶答曰或是學或是非學非無學學者有為斯陀含果若道比智及眷屬若第六解脫道及眷屬云何非學非無學答曰無為斯陀含果謂三界見道所斷結斷及欲界修道所斷六種結斷阿那含成就諸學法彼法阿那含果攝耶答曰或攝或不攝云何攝答曰有為阿那含果得已不失得者信解脫得信解脫諸根見到得見到諸根不失者信解脫不轉根作見到不失信解脫諸根云何不攝阿那含前進得勝妙無漏諸根前進者離初禪欲方便道九無礙道九解脫道乃至離非想非非想處愛方便道九無礙道八解脫道如是等前進道所有學法阿那含成就彼非阿那含果攝所以者何前進道非阿那含果攝設法阿那含果攝彼法是學耶答曰或是學或是非學非無學云何是學答曰有為阿那含果若道比智及眷屬若第九解脫及眷屬云何非學非無學答曰無為阿那含果三界見道所斷結斷及欲界修道所斷九種結斷阿羅漢成就諸無學法彼法阿羅漢果攝耶答曰如是所以者何阿羅漢所有方便道無礙道解脫道前進道盡阿羅漢果攝設法阿羅漢果攝彼法是無學耶答曰或是無學或是非學非無學云何是無學答曰有為阿羅漢果盡智無生智無學等見及眷屬云何非學非無學答曰無為阿羅漢果三界見道修道所斷結斷須陀洹成就諸無漏法彼法須陀洹果攝耶答曰或攝或不攝云何攝答曰須陀洹果得已不失得者信解脫得信解脫性須陀洹果見到得見到性須陀洹果三界見道所斷結斷不失者信解脫不轉根作見到不失信解脫性須陀洹果云何不攝須陀洹果前進得勝妙諸無漏根方便道六無礙道五解脫道如是等前進道及漸斷結得作證謂欲界修道所斷五種結斷如前進道非果攝彼斷亦爾須陀洹所成就非數滅此滅非是須陀洹果所以者何非數滅是無記須陀洹果是善故設法須陀洹果攝彼法是無漏耶答曰如是所以者何有為須陀洹果無為須陀洹果皆是無漏故斯陀含成就諸無漏法彼法斯陀含果攝耶答曰或攝或不攝云何攝答曰斯陀含果得已不失得者信解脫性得信解脫斯陀含果見到得見到性斯陀含果三界見道所斷結斷