果耶答曰若從果至果盡捨無漏根得無漏根頗有捨無漏根得無漏根彼非從果至果耶答曰有得正決定道比智現前時時解脫阿羅漢轉根作不動彼尊者有何勞惓不説信解脫轉根作見到耶若信解脫不轉根作見到者此文所説云何通如説若不得須陀洹果得已便失若信解脫不轉根作見到者云何言得已便失耶智犍度説復云何通如説須陀洹於此三三昧未來盡成就過去已滅不失現在若現在前若信解脫不轉根作見到者已滅三昧云何失耶識身經説復云何通如説過去無學心得作三句名已知不名今知不名當知此中成就已知名説時解脫阿羅漢退作信解脫轉根作見到還得阿羅漢果今不成就不當成就時解脫道答曰應作是説信解脫轉根作見到問曰若然者後所説善通根揵度中何故不説耶答曰彼文應如是説得正決定道比智現在前信解脫轉根作見到時解脫轉根作不動應如是説而不説者有何意耶答曰現始終故始是道比智終是時解脫轉根作不動如始終初入已度方便畢竟亦如是尊者僧伽婆修説曰信解脫轉根作見到得斯陀含果時亦名是得果亦名轉根得阿那含果時亦名得果亦名轉根問曰若然者得須陀洹果時何不名轉根得阿羅漢果時何不名轉根耶答曰出過欲界是數數舊法無有衆生不曾不出過欲界者是故離彼欲時得二沙門果亦名得果亦名轉根出過非想非非想處非是數數舊法無有衆生曾出過者是故離彼欲時得二沙門果但名得果不名轉根問曰如汝所説得斯陀含果阿那含果時亦名得果亦名轉根是事可爾退法轉根作憶法乃至等住轉根作能進此中何以不説彼作是答已説在此義中何以知之退法轉根作憶法時得憶法時根不捨退法根乃至等住轉根作能進時得能進根不捨四種根能進轉根作不動時得不動根不捨五種根彼不應作是説所以者何無有一人成就二根者何況多耶復有説者信解脫不轉根作見到是故根揵度不説問曰若然者智揵度説云何通答曰彼文應如是説須陀洹三三昧未來悉成就現在若現在前過去已滅不應言不失應説而不説者有何意耶答曰誦習錯謬故問曰此文所説復云何通答曰或有説成就過去未來得或有説不成就過去未來得若作是説不成就過去未來得者彼作是説若不得須陀洹果是説未來若得已是説現在便失是説過去若作是説成就過去未來得者彼作是説須陀洹果有三種謂下中上若初住下須陀洹果不得中上須陀洹果故言不得得下須陀洹果故言得已不應言便失若初住中須陀洹果故言得已不得上須陀洹果故言不得失下須陀洹果故言便失若初住上須陀洹果不應言不得得上須陀洹果故言得已便失者失中下須陀洹果問曰本不成就中下須陀洹果何故言失答曰超過二根故名失所以者何超彼二根能生之勢故作是説識身經復云何通答曰識身經則不可通評曰應作是説信解脫轉根作見到若信解脫不轉根作見到者時解脫亦不轉根作不動所以者何如學地無止息無救護無學地亦爾尊者佛陀羅測説曰信解脫轉根作見到有六事不共一在欲界不在色無色界二依禪不依無色定三用無漏道不用世俗道四用法智不用比智五退非不退六住果道不住勝果道在欲界不在色無色界者欲界有説法人以説法力故能轉根鈍作利依禪不依無色定者本依何地得學果即依彼地信解脫轉根作見到用無漏道不用世俗道者以猛利道能轉根世俗道非猛利用法智不用比智者生欲界轉根者於法智得自在不於比智退非不退者厭患退故轉根住果道非勝果道者若住勝果道轉根者則失多道得少道是名減少不名增益阿毗曇者作如是説信解脫轉根作見到如彼所説但於六事中三事不可爾唯在欲界不在色無色界此事可爾依禪不依無色定此亦可爾唯以無漏道不以世俗道者此亦可爾唯用法智不用比智者此不必爾所以者何或有於比智善得自在非法智退法非不退法者此不必爾所以者何退法亦能轉根不退法亦能轉根不必退法唯住果道不住勝果道者此不必爾所以者何住果道亦能轉根住勝果道亦能轉根問曰若然者豈非捨多道得少道是損減非增益耶答曰彼求利根不求多道尊者瞿沙跋摩説曰信解脫轉根作見到唯在閻浮提不在餘方問曰依何地得學果即依彼地轉根耶答曰即依彼地亦依餘地是勝地非下須陀洹斯陀含必依未至禪得果轉根阿那含依得果地亦依餘地轉根阿那含極少者成就三地阿那含果謂初禪未至中間禪若依未至若依初禪若依禪中間必成就三地道比智阿那含果若依二禪得正決定者必成就四地道比智阿那含果若依第三禪成就五地若依第四禪成就六地次第人離欲愛時最後解脫道成就三地阿那含果若依初禪得正決定即依初禪轉根者彼捨三地阿那含果得三地阿那含果若依初禪得正決定依第二禪轉根者彼捨三地得四地若依初禪得正決定依第三禪轉根者彼捨三地得五地若依初禪得正決定依第四禪轉根者彼捨三地得六地若依二禪得正決定即依二禪轉根者彼捨四地得四地若依二禪得正決定依第三禪轉根者彼捨四地得五地若依二禪得正決定依第四禪轉根者彼捨四地得六地若依三禪得正決定即依三禪轉根者彼捨五地得五地若依三禪得正決定依第四禪轉根者彼捨五地得六地若依第四禪得正決定即依第四禪轉根者彼捨六地得六地問曰頗有依上地得果依下地轉根耶答曰或有説者無若有者則捨多道得少道是損減非增益故復有説者有如依第四禪得正決定依第三禪轉根者捨六得五依第四禪得正決定依第二禪轉根者捨六得四依第四禪得正決定依初禪轉根者捨六得三三禪二禪初禪應隨相説問曰若然者豈非捨多道得少道是損減非增益耶答曰若爾亦無有過所以者何彼求利道不求多道頗有離無所有處愛聖人成就一地無漏耶答曰有離無所有處愛依未至禪得正決定見道中十五心頃是也頗有離無所有處愛阿那含成就三地無漏耶答曰有若依初禪未至中間禪信解脫轉根作見到頗有身證人不成就無漏無色定耶答曰有依禪信解脫轉根作見到未離初禪愛依初禪轉根者捨三地無漏道得三地無漏道離初禪愛未離二禪愛依初禪轉根者捨四得三離第二禪愛未離第三禪愛依初禪轉根者捨五得三離第三禪愛未離第四禪愛依初禪轉根者捨六得三離第四禪愛未離空處愛依初禪轉根者捨七得三離空處愛未離識處愛依初禪轉根者捨八得三離識處愛未離無所有處愛依初禪轉根者捨九得三離第二禪愛乃至離識處愛依第二禪轉根者捨九得四離第三禪愛乃至離識處愛依第三禪轉根者捨九得五離第四禪愛乃至離識處愛依第四禪轉根者捨九得六問曰離無所有處愛信解脫轉根作見到捨無色界對治道為捨斷不若捨者何不成就結若不捨者對治已捨以何事故不捨斷耶答曰應作是説不捨問曰對治已捨以何事故不捨於斷答曰無色界對治有二種得雖捨無漏不捨有漏以為有漏所持故不捨問曰如有漏道能有所作處可爾不能有所作處云何可爾如漸離非想非非想處愛信解脫轉根作見到捨非想非非想處修道所斷對治道為捨彼斷不若捨者云何不成就結若不捨者對治已捨以何事故不捨於斷答曰或有説者無有漸離非想非非想處愛而轉根者若轉者或是退或畢竟離欲復有説者有漸離非想非非想處愛轉根者捨對治道不捨斷評曰應作是説捨對治道亦捨斷而不成就結如離無所有處愛命終生非想非非想處從欲界乃至識處所有對治道及斷悉捨而不成就結彼亦如是信解脫轉根作見到時用一方便道一無礙道一解脫道時解脫轉根作不動時或有説以一方便道一無礙道一解脫道評曰應作是説以一方便道九無礙道九解脫道所以者何以更得沙門果重用功故如人壞舍壞已更作名重用功彼亦如是信解脫轉根作見到時方便道是有漏無漏未來亦修有漏無漏道無礙道是無漏未來亦修無漏道解脫道亦是無漏或有説者未來修有漏無漏道或有説者唯修無漏時解脫轉根作不動時方便道是有漏無漏未來修有漏無漏道九無礙道八解脫道唯是無漏未來修無漏道最後解脫道是無漏未來修有漏無漏道及三界善根信解脫轉根作見到時方便道或是曾得或非曾得無礙道解脫道一向非曾得時解脫轉根作不動時方便道或是曾得或非曾得無礙道解脫道一向非曾得是信解脫轉根作見到時方便道無礙道是信解脫道攝解脫道是見到道攝時解脫轉根作不動時方便道九無礙八解脫道是時解脫道攝最後解脫道是非時解脫道攝信解脫轉根作見到時若住果道而轉根者彼方便無礙解脫道是果道攝若住勝果道而轉根者彼方便無礙道是勝果道攝解脫道是果道攝時解脫轉根作不動時方便無礙解脫道是果道攝所以者何無勝果道故信解脫轉根作見到時住果而轉根者是名捨果得果若住勝果道而轉根者是名捨果捨勝果道而得果時解脫轉根作不動時名捨果得果六種阿羅漢謂退法憶法護法等住能進不動若退法轉根作憶法時捨退法根得憶法根若憶法轉根作護法時捨憶法根得護法根若護法轉根作等住時捨護法根得等住根若等住轉根作能進時捨等住根得能進根若能進轉根作不動時捨能進根得不動根如無學地六種修道中六種學性亦如是問曰退法轉根作不動時為住退法根得不動為次第轉五種根得不動耶答曰或有説者住退法根轉根得不動無學時異用功多難得是故次第轉學地不爾評曰應作是説一切時次第而轉如修道中有六種性見道中亦有六種性謂退法乃至不動無有轉根者所以者何見道是速疾不起道故如見道中有六種性修行地中亦有六種性謂退法乃至不動若轉者退法暖法不現在前憶法暖法現在前乃至能進暖法不現在前不動暖法現在前聲聞性暖法不現在前辟支佛性暖法現在前辟支佛性暖法不現在前佛性暖法現在前如暖法頂法亦如是忍差別者聲聞性忍不現在前辟支佛性忍現在前無有聲聞辟支佛忍不現在前佛忍現在前所以者何忍與惡趣相妨菩薩以願力故當生惡趣復有説者聲聞暖頂不現在前亦不起辟支佛暖頂現在前所以者何如佛自然無師彼辟支佛亦爾如佛一結跏趺坐生諸善法現在前從不淨乃至盡智無生智辟支佛亦爾世第一法亦有六種性退法乃至不動無轉根者所以者何彼善根一剎那頃無住相故須陀洹有六種性退法乃至不動是故作如是説頗有退須陀洹果不成就見道所斷結耶答曰有從上根性退下根時
