body:
  text: 迦旃延子造五百羅漢釋北涼天竺沙門浮陀跋摩共道泰等譯云何世第一法何故名世第一法如是章及解章義是中應廣説優波提舍問曰誰造此經答曰佛世尊所以然者諸法性相甚深微妙唯一切智乃能究盡問曰誰問誰答答曰或有説者尊者舍利弗問佛答復有説者五百阿羅漢問佛答復有説者諸天問佛答復有説者化人問佛答所以者何諸法性相應當廣説然無問者爾時世尊作化比丘剃除鬚髮著僧伽梨形容端政彼問佛答如問衆義經因緣問曰若然者何故復言迦旃延子造耶答曰彼尊者常好受持讀誦為他解説廣令流布名稱歸彼故言其造復有説者即彼尊者迦旃延子造作此經問曰向言諸法性相甚深微妙唯一切智乃能究竟尊者迦旃延子云何能造答曰彼尊者迦旃延子亦有猛利甚深智慧善知總相別相又知文義及前後際通達三藏三明六通具八解脫離三界欲獲得願智於五百佛所修行立願願使我於未來世釋迦牟尼佛遺法之中造阿毗曇經問曰若然者佛阿毗曇何者是耶答曰世尊於處處方邑為化衆生作種種説彼尊者迦旃延子於種種説中立章門造偈頌制品名作犍度若説種種不相似義立雜犍度若説使相立使揵度若説智相立智犍度若説業相立業犍度若説四大相立四大犍度若説根相立根犍度若説定相立定犍度若説見相立見犍度如法句經世尊於處處方邑為衆生故種種演説尊者達摩多羅於佛滅後種種説中無常義者立無常品乃至梵志義者立梵志品此迦旃延子亦復如是又諸佛出世盡説三藏所謂修多羅毗尼阿毗曇問曰修多羅毗尼阿毗曇有何差別答曰或有説者無有差別所以者何從一智海佛河出故因大慈心説故復有説者亦有差別云何差別名即差別所謂此修多羅此毗尼此阿毗曇復次為分別心名修多羅為分別戒名為毗尼為分別慧名阿毗曇問曰若然者修多羅中亦分別戒亦分別慧毗尼中亦分別心亦分別慧阿毗曇中亦分別心亦分別戒如是三藏有何差別答曰從多分故修多羅中多説心法毗尼中多説戒法阿毗曇中多説慧法復次修多羅中若分別心名修多羅若分別戒名毗尼若分別慧名阿毗曇阿毗曇中若分別戒名毗尼若分別心名修多羅若分別慧名阿毗曇毗尼中若分別慧名阿毗曇若分別戒名毗尼若分別心名修多羅如是三藏是名差別復次修多羅中應次第求以何等故世尊説此次復説此如説信佛次應信法是次第求義毗尼中應因緣求如説此戒緣何事制阿毗曇中應以相求不以次第復次修多羅依力故説毗尼依大慈故説阿毗曇依無畏故説復次種種雜説名修多羅廣説戒律名曰毗尼説總相別相名阿毗曇復次未種善根令種善根名修多羅已種善根欲令成熟名曰毗尼善根已熟得正解脫名阿毗曇復次為初入法名修多羅已入法中為受持戒名曰毗尼已受戒者為令正解名阿毗曇修多羅毗尼阿毗曇是名差別問曰彼尊者以何因緣造作此經答曰為饒益他故若有受持讀誦通利説正憶念無量煩惱及諸惡行不現在前以此勤修能入法相譬如有人欲饒益他於黑暗中然大燈明為有目者見種種色彼尊者亦復如是為饒益他造作此經佛亦如是為饒益他説十二部經一修多羅二祇夜三婆伽羅那四伽他五優陀那六尼陀那七阿波陀那八伊帝目多伽九闍陀伽十毗佛略十一阿浮陀達摩十二優婆提舍所以者何若有衆生雖有內因無外緣者終不能修勝進之行若遇外緣則能修行譬如鉢頭摩分陀利拘物頭優鉢羅華在池水中日光不照不開不敷不香日光若照則開敷出香如暗室中有種種物若無燈照終不可見有燈則見衆生亦然雖有內因若無外緣終不能修勝進之行若遇外緣則能修習勝進之行以是緣故佛説偈言譬如暗室中雖有種種物若無燈明照有目不能見若人雖有智不從他聞法是人終不能分別善惡義譬如有目人因燈見衆色有智依多聞能別善惡義多聞能知法多聞能遠惡多聞離無義多聞得涅槃佛經亦説有二因二緣發於正見一從他聞法二內正思惟又説人有四法甚為希有一親近善知識二從他聞法三內正思惟四如法修行又説若我弟子一心聽法能斷五蓋具足修行七覺分法如佛世尊為饒益他故説十二部經彼尊者亦復如是復次為破無明暗故如燈破暗作明阿毗曇者亦復如是破無明暗與智慧明復次欲令無我像得分明故譬如明鏡照諸色像若人能以阿毗曇慧善分別總相別相無我人像自然顯現復次為度生死河故譬如百千那由他衆生依堅牢船而無所畏能從此岸到於彼岸如是百千那由他諸佛世尊及諸眷屬亦復如是依阿毗曇船而無所畏能從此岸到於彼岸復次為諸修多羅經作燈明故如人執炬於諸暗中終無所畏如是行者執阿毗曇炬於諸修多羅義中而無所畏復次為觀察善不善無記法故如善識寶人善別金剛等寶如是知者以阿毗曇慧分別善不善無記法復次為現阿毗曇人須彌山不傾動故如須彌山王安住金輪地上四方猛風不能傾動如是智者以阿毗曇慧須彌山安置於戒金輪地上四倒邪風不能傾動復次以三因緣故尊者迦旃延子造作此經一為增益智故二為開覺意故三為斷我人故增益智者於內外法中一切經論莫若阿毗曇開覺意者衆生常眠無有覺時不知何者是一切遍使何者不遍使何者自界緣遍使何者他界緣遍使何者有漏緣何者無漏緣何者有為緣何者無為緣云何為攝云何相應云何因云何緣誰成就誰不成就能了知如是等遠近法者是阿毗曇力斷我人者彼尊者造阿毗曇經未曾説有我人於一切處常説無我無人以如是等衆因緣故彼尊者造阿毗曇經問曰阿毗曇體為何者是耶答曰無漏慧根自體攝一界一入一陰一界者法界一入者法入一陰者行陰若取相應共有攝三界二入五陰三界者意界識界法界二入者意入法入五陰者色受想行識又修多羅説此帝釋長夜其心質直無有諂曲諸有所問為了知故不為嬈亂我當以甚深阿毗曇恣汝所問此中何者是甚深義所謂無漏慧根又如經説有梵志姓犢子其性質直無有諂曲諸有所問為了知故不為嬈亂我當以甚深阿毗曇恣汝所問此中何者是甚深義所謂無漏慧根復有梵摩瑜婆羅門須跋梵志亦如上説如佛告先尼梵志我法甚深難解難了難知難見非思量分別之所能及唯有微妙決定智者乃能知之非汝淺智之所能及所以者何空即無我而汝計我汝常長夜有異見異欲異心以是之故非汝淺智之所及也此中何者是甚深義所謂空三昧也如説愚人無眼而與上座智慧比丘論甚深義此中何者是甚深義所謂退法是也如佛告阿難此十二因緣法甚深難解難了難知難見非思量分別之所能及唯有微妙決定智者乃能知之非汝淺智之所能及此中何者是甚深義所謂因緣是也如説此處甚深所謂緣起此法離欲寂滅涅槃此中何者是甚深義所謂因緣寂靜滅性也如説諸法甚深故難見難見故甚深此中何者是甚深一切諸法體性甚深是也問曰阿毗曇體何者是耶答曰無漏慧根以無漏慧根力故令生處得慧能受持十二部經讀誦通利亦名阿毗曇也又以無漏慧根力故能令聞慧知總相別相又令聞慧建立總相別相又令聞慧斷自性愚及緣中愚於法不謬又以無漏慧根力故能令思慧不淨安般念處等亦名阿毗曇又以無漏慧根力故能令修慧暖頂忍世第一法亦名阿毗曇又以如是等慧令無漏慧根轉得明淨名阿毗曇問曰若無漏慧根是阿毗曇體者何故此經復名阿毗曇答曰阿毗曇具故亦名阿毗曇如處處經中説因種種具立種種名以漏具故説漏如説七漏是煩惱是熾然是苦惱實漏有三所謂欲漏有漏無明漏垢具故説垢如偈説女垢梵行女縛衆生苦行梵行不因水淨女實非垢實垢有三所謂貪瞋癡垢樂具故説樂如偈説飲食時樂著衣亦樂經行山窟斯亦復樂飲食等非樂實樂者是樂受使具故説使如説比丘為色所使為色所繫色非是使實使有七味具説味如説比丘眼味於色色是魔鉤眼非是味實味是愛欲具説欲如説五欲美好能令愛心增長染著色等非欲實欲是愛退具説退如説時解脫阿羅漢有五因緣退一者營事勤勞二者多誦經三者諍訟四者遠行五者長病非營事等是退實退是不善隱沒無記法業具説業如説比丘有三種意不善業生苦果報所謂貪恚邪見貪恚邪見體非是業實業有三謂身口意報具故説報如尊者阿泥盧頭説我以一食施報七生三十三天七生波羅奈國食非生報生報者是不善善有漏法如是等處處經中説因種種具説種種名此亦如是阿毗曇具故説阿毗曇問曰以何義故名阿毗曇答曰尊者和須蜜説能決定分別十二部經名阿毗曇復説能覺了十二因緣名阿毗曇復次於四聖諦能次第得正決定名阿毗曇復説能解説修習八聖道法名阿毗曇復説能證涅槃名阿毗曇尊者婆檀陀説曰煩惱出要繫縛解脫生死涅槃如是等法以名味句身次第撰集分別解説名阿毗曇尊者瞿沙説曰求解脫者諸所施行未分別者皆分別之所謂是苦是苦因是道是道果是方便道是無礙道是解脫道是勝進道是向果道是得果名阿毗曇尊者波奢説曰此智是究竟智此智是第一智此智是不謬智名阿毗曇阿毗曇人説曰能種種選擇覺了證知一切諸法名阿毗曇復説法性甚深能盡其原底名阿毗曇復説能淨法眼名阿毗曇復説顯發幽隱甚深智慧名阿毗曇復説若人以阿毗曇慧分別總相別相無有人能如法説其過者名阿毗曇彌沙塞部説曰如燈能照名阿毗曇如説一切照中慧照最上曇摩掘部説曰此法增上名阿毗曇如説一切諸法慧為最上譬喻者説曰種種諸法涅槃為上此法次故名阿毗曇聲論者説曰阿毗言除棄亦言選擇除棄者所謂結縛使纏煩惱選擇者所謂陰入界緣起道品等諸法復次阿毗言增上慢如説名增上慢如説上者名增上者如説上逸名增上逸此經增上名阿毗曇復次阿毗言現前一切諸善道品等法皆現在前名阿毗曇復次阿毗言恭敬此法尊重可敬名阿毗曇此經名智慧基本問曰何故名智慧基本答曰諸究竟智皆出此經故名基本復次此經名安智足處諸究竟智皆因此經而得成立是故名安智足處問曰此經有何利益答曰隨順解脫隨順無我斷計我人顯明無我發人覺意出生智慧除愚癡斷疑網得決定背熾然向出要得相續樂寂靜止生死輪隨順空法到涅槃岸能斷一切外道異見於佛法中能生一切欣樂之心此經有如是等利名阿毗曇阿毗曇毗婆沙雜犍度世第一法品第一云何世第一法問曰何故此經先説世第一法為順次説為逆次説耶若順次説者應先説不淨次説安般次説念處次説七處善三種觀義暖頂忍然後應説世第一法若逆次説者應先説阿羅漢果次説阿那含果次説斯陀含果次説須陀洹果次説見道然後應説世第一法又問為以初入法故説為以達分善根故説為以最勝功德故説若以初入法説者應説不淨若説安般若以達分善根説者應先説暖法以暖法最在初故如尊者瞿沙論中先説暖法若以最勝功德説者應先説阿羅漢果有如是等事如佛在世尊者大迦旃延有正觀智慧成就無量功德無礙精進入阿毗曇海心無增減覺意無邊言論難勝一切義論無能當者第二迦栴延子亦有如是智慧功德何故造作此經先説世第一法答曰諸論師説世第一法種種不同或有説者不以順次故説亦不以逆次故説但彼作經者意爾隨彼意故造作此經不違法相是故先説世第一法或有説者阿毗曇應以相求不求次第修多羅經應求次第毗尼應求因緣阿毗曇經若求次第於文煩亂是故不應求其次第或有説者世尊經説若人不能正觀諸行性相能起世第一法者無有是處若能正觀諸行性相能起世第一法者斯有是處如世尊經中先説世第一法彼作經者因經造論故亦應先説世第一法問曰置作經者世尊何故先説世第一法答曰世尊為化衆生次第説法諸受化者已得下忍中忍未得上忍及世第一法欲令得故世尊説正觀思惟諸行性相當知即是上忍次得此世第一法是故先説或有説者為止諸誹謗故世第一法多諸誹謗所謂名受誹謗體受誹謗界受誹謗現前受誹謗退受誹謗名受誹謗者或言是性地法非世第一法體受誹謗者或言是五根性界受誹謗者或言是欲界繫或是色無色界繫或是三界繫或是不繫現前受誹謗或是多心相續非是一心退受誹謗者或言世第一法退為止如是等諸誹謗故先説世第一法復次一切生死非牢固法如糞掃污泥此中誰最勝誰牢固誰如醍醐所謂世第一法是故先説復次以隨順無我故此經常説無我非如外典説我説欲法説有法説財此經唯説無我解脫涅槃此世第一法亦觀無我隨順此經故是以先説復次此經於一切論中最勝世第一法於一切世俗善法中最勝以此經勝故應先説勝法復次若住世第一法時名真佛出世能得自在受用聖法佛出世間衆生入法凡有二種一假名二真實假名者剃除鬚髮而被法服正信出家真實者起世第一法次第能入苦法忍是假名沙門有二過患一者破戒二者捨戒入正法者無如是過真實沙門受用聖法能得自在隨其性分終無退失復次住世第一法時無始生死已來聖道門閉今始能開未曾能捨凡夫之性今始能捨未曾能得無漏聖道今始能得是故先説世第一法復次住世第一法時捨名得名捨數得數捨界得界捨性得性捨名得名者捨凡夫名得聖人名數界性亦如是復次住世第一法時得心不得心因得明不得明因得受不得受因復次住彼法時捨舊緣得新緣捨共得不共捨世間得出世間復次為斷疑故衆生謂凡夫性無始亦謂無終今説世第一法即示其終復次住彼法時凡夫退患凡夫變異凡夫剛強悉不復起暖頂忍法或有起復次住彼法時無有不得聖法而命終者暖頂忍不爾住彼法時無有不得聖道而命終者不得正決定而得正決定不得果得果出不定聚入正定聚無聖道有聖道無不壞淨有不壞淨亦如是復次住此善根無有止滯暖頂忍法而有止滯復次住彼法時凡夫人所修念處究竟滿足餘則不爾復次住彼法時漏無漏心有斷有續斷者有漏心續者無漏心餘則不爾復次如須彌山王安金輪上四方猛風不能傾動住此法時四倒邪風不能傾動復次住彼法時示始終故猶如明相是夜末晝初彼亦如是世俗之末聖道之初如示始終度已度入出方便究竟亦如是復次欲示相似法有異相故世第一法苦諦所攝能生滅苦道以苦攝世俗攝生死攝諸有攝身見所使攝法生滅苦道餘則不爾復次世第一法體是世俗緣能生出世緣是故先説如是有垢無垢有過無過有毒無毒有濁無濁有身見聚無身見聚有顛倒聚無顛倒聚有愛聚無愛聚有使聚無使聚亦如是復次以世第一法有勢有力能有所作猶如健夫住此法中得正決定故復次以三事故一以經義故二止誹謗故三即此剎那得果故經義止謗如上説即此剎那得果者世第一法次第能生苦法忍名功用果以是次第諸因緣故先説世第一法復次欲逆次説凡夫所得法故如説世第一法乃至暖法是名凡夫所得出要法如説二十身見等是名凡夫煩惱法此二種法誰能知者唯無我智是故第二品中作如是説頗有一智知一切法乃至廣説此無我智何由而生由覺緣起是故第三品中作如是説一人此生十二種緣乃至廣説所以能覺緣起由於愛敬是故第四品中作如是説云何為愛云何為敬乃至廣説此愛敬何因而起由有慚愧是故第五品中作如是説云何慚云何愧乃至廣説誰能慚愧由解法相是故第六品中作如是説色中生住老無常當言色也非色也乃至廣説何由能解法相由斷無義修習有義是故第七品中作如是説諸他修苦行當知無義俱乃至廣説何由斷無義修有義由正思憶是故第八品中作如是説云何為思云何為憶乃至廣説以是衆因緣事欲逆次説凡夫所得法是故先説世第一法云何世第一法答曰於諸心心數法次第得正決定是名世第一法問曰已能得正決定當能得正決定復是世第一法不答曰亦是若説現在當知則説過去未來問曰世第一法得正決定為住時得為滅已得若住時得者亦是凡夫亦是聖人若滅已得者何故不言已得正決定而言今得答曰應説已得所以經文不説已得自有已得説言今得如説大王從何處來此名已來而説今來已覺諸受已斷漏已得解脫亦如是或有説者應作是説無間得正決定是名世第一法評曰無間得正決定次第得正決定有何差別復有説者苦法忍雖未生此第一法決定為次第緣是故言今得正決定或有説者於諸五根次第得正決定是名世第一法問曰誰作此説答曰舊阿毗曇人説問曰彼何故説五根是世第一法答曰彼不必欲令五根是世第一法為斷異論故異論者毗婆闍婆提説信等五根一向無漏故一切凡夫悉不成就問曰彼以何故作如是説答曰彼依佛經佛經説言五根猛利通達滿足向阿羅漢若無五根墮凡夫數彼以經作如是説故言信等五根悉是無漏為斷彼人如是論故説信等五根是世第一法若信等五根是無漏者無始已來未曾能起一念無漏而得世第一法是故當知五根非純無漏復次若五根是無漏者違佛正經如説若我於信等五根不能如實觀是集是滅是味是患是捨者則不能得阿耨多羅三藐三菩提乃至廣説不應以如是相觀無漏法毗婆闍婆提曰應以如是相觀無漏法云何應觀如經説不能如實觀信等五根者是別相觀信等五根何由而得由親近善知識積集而得是名觀集云何觀滅未知欲知根滅已知根生是名觀滅云何觀味此無漏法亦為愛緣是名觀味問曰無漏法亦為愛所繫耶答曰不也如汝法中有無漏緣使緣而不縛我亦如是云何觀患諸無漏法是無愛故是名觀患云何觀捨一切有為涅槃時捨是名觀捨為斷如是種種諸論故作是説於諸五根次第得正決定是名世第一法復次若當五根一向無漏復違佛經如説我以佛眼觀衆生根有上中下毗婆闍婆提説曰佛經説上根者阿羅漢中根者阿那含下根者斯陀含須陀洹育多婆提説曰若爾者世尊不轉法輪名轉法輪一切聖人已滿世間佛亦不須復轉法輪毗婆闍婆提説曰世尊所以説諸衆生上中下根者説根所依處不説根體育多婆提説曰若然者復違此經如説闍提輸那婆羅門往至佛所白佛言沙門瞿曇説有幾根佛答言有二十二根此亦説根所依處然俱同説是根一是根所依一是根體無有是處是故信等五根應有漏無漏問曰毗婆闍婆提所引佛經當云何通答曰信等五根有二種有漏無漏彼經唯説無漏所以者何因諸根故説聖人差別復次五根有漏無漏彼經唯説無漏所以者何以聖為對治法故聖人差別問曰上言若無五根墮凡夫數此云何通答曰彼言墮凡夫數者謂斷善根凡夫或有説者犢子部説五根是世第一法何以故五根是善性以五根善故餘數法亦善亦以根故聖人差別如説五根猛利通達滿足得阿羅漢廣説如上問曰以何事故尊者迦旃延子引犢子部所立義耶答曰彼犢子部所説而與此經少有相違所謂五根是世第一法凡夫性一向染污彼以欲界苦諦所斷十使是凡夫性涅槃有三種學無學非學非無學阿須羅是第六道説有我人為如是等若五若六與此經相違莫謂彼部所説盡與此經同彼作經者為斷如是意故次作是説如我義於諸心心數法次第得正決定是名世第一法問曰如汝所説五根性善餘心心數法性非是善者應是不善無記若以五根性善不善無記親近五根亦名善者今五根亦親近不善無記應是不善無記此則不然何以故根與心心數法同一所依同一行同一所緣同一果同一依同一報共成一事而云其性善是親近善者是妄想耳或有説者誦持修多羅者説言五根是世第一法尊者達摩多羅説曰世第一法體性是思名差別耳尊者佛陀提婆説曰世第一法體性是心名差別耳所以者何信心異乃至慧心異若有衆生能於一時以五種心次第得正決定無有是處若一一次第得正決定斯有是處問曰若然者以不相應法得正決定耶答曰不也所以者何汝法心不與心相應有為所緣有為所緣故能次第得正決定我信亦爾不與信相應能有所緣有所緣故次第得正決定乃至慧亦如是問曰若然者則有大過所以者何若但信心得正決定不以精進念定慧等得正決定者懈怠失念亂意惡慧亦應次第得正決定乃至慧亦如是為斷彼人如是意故故作是説如我義於諸心心數法次第得正決定是世第一法如我義者謂不顛倒如法性順經文同我等意而作是説諸心心數法次第得正決定是名世第一法彼迦旃延子欲顯正義故言世第一法亦是根亦非根問曰如世第一法現在前未來世中心心數法亦修彼為是第一法不耶答曰或有説者依如經本非世第一法何以故經本説諸心心數法次第得正決定是世第一法彼未來者不能作次第是故非世第一法復次若當是者復違經本如説世第一法當言一心非衆多心評曰應作是説彼未來者亦是世第一法問曰彼未來者不能作次第緣云何是世第一法耶答曰彼未來者雖不能作次第而能隨順作次第法譬如比丘布薩時不在僧中而與僧欲名得布薩僧事亦成如是彼在未來世中為現在得如與欲者若未來世中無現在得不與欲者今現在者亦不能作次第若作次第當知皆是未來者力何以故彼未來者不與聖道作障礙故復次若彼未來非世第一法者與智犍度經文相違所以者何如未曾得道今現在前彼未來世中相似種修若彼未來不作世第一法者云何名彼種相似修以是事故彼未來者亦是世第一法問曰若未來是世第一法者經文何故不説耶答曰若能與次第緣者經文則説彼不能與次第緣是故不説復次若流轉三世者則説未來不爾或有説者從因而生成就此法住在身中是故説之彼未來者雖從因生成就此法不住身中是故不説問曰若然者云何非是衆多心耶答曰此中唯説現在剎那能成事者故非衆多心或有説者若能令未來世中修者則説未來不爾或有説者若心彼因彼心此果是以故説未來不爾或有説者能與因能取果住身中能有所緣是以故説未來不爾或有説者有二修義是以故説彼未來者唯有得修無有行修是故不説問曰彼世第一法俱生色心不相應行為是世第一法不耶答曰或有説者如經本説彼非世第一法所以者何彼不能與次第緣故評曰應作是説彼亦是世第一法問曰彼不能與次第緣云何名世第一法耶答曰彼雖不能與次第緣而能隨順次第緣義所以者何彼與世第一法俱生住滅同一果一依一報是以故説問曰彼若是世第一法者經本何故不説耶答曰彼不能與次第緣故是以不説或有説者若從因生成就此法能有所緣是以説之彼雖從因生成就此法不能有所緣是故不説或有説者若是相應有依有勢有行有緣是以故説彼非相應無依無勢無行無緣是故不説問曰彼世第一法得為是世第一法不耶答曰彼非世第一法問曰以何等故生住無常是世第一法而得非耶答曰生等一事世第一法同一果共行不相離常相隨無前後得則不爾不同一果不共行相離不相隨有前後或離所得法如樹皮離樹以是義故非世第一法問曰以何義故沙門果得即沙門果而此第一法得非世第一法耶答曰以成就得故名沙門果是以得即沙門果能與次第緣亦能隨順次第緣義名世第一法得則不爾是故非世第一法如是餘達分善根得非達分善根何以故若得即是達分善根者已得聖果應重起達分善根現在前以成就得故而實不爾是故得非達分善根或有説者若共起世第一法俱生者名世第一法後生者非餘達分善根亦如是或有説者得即是世第一法其餘達分善根得即是達分善根問曰若然者已得聖果應重起達分善根現在前答曰或現前或不現在前何者現前所謂得也何者不現在前所謂諸相應法也評曰不應作如是説如先所説者好問曰世第一法為幾念處答曰現在一壞緣法念處未來四問曰世第一法為幾緣答曰為四緣因緣者相應共有因次第緣者與苦法忍作次第緣境界緣者忍智所緣威勢緣者除其自體餘一切法是彼緣生法於世第一法亦有四緣因緣者相應共有法次第緣者苦忍是境界緣者欲界五陰是威勢緣者除其自體餘一切法是復有義説者云何名出世第一法答曰苦法忍是所以者何是聖道種子故復有説者金剛喻定是所以者何能盡諸結得究竟果故復有説者盡智是所以者何以初得盡智餘無漏法時淨修故復有説者正三昧是所以者何得一切有為法中正定最勝故復有説者涅槃是所以者何一切法中最妙勝故復有説者阿羅漢最後心是所以者何凡夫人最後心名世第一法阿羅漢最後心名出世第一法評曰不應作是説彼阿羅漢最後心非出世法故如先説者好問曰頗有世第一法不與苦法忍作次第緣耶答曰有世間第一法色心不相應法則是問曰頗有相應法不與苦法忍作次第緣耶答曰有未來修者是也尊者佛陀提婆説曰若以信心得正決定是名世第一法與苦法忍作次第緣餘精進念定慧心是名世第一法而不與苦法忍作次第緣説相似法沙門説曰受與受作次第不與想等餘數法亦如是心法生時遇緣便生若愛前緣生樂受欲有所想生想欲有所作生思問曰若然者無相似次第義答曰有但非一一次第耳如汝法中無想衆生生時心滅死時心生想去雖遠得作次第我法亦爾如受滅想等生復還生受相去雖遠得作次第評曰不應作是説心與心作次第受與受作次第心心數法一一次第生作次第緣若作是説與經文相違如説云何心次第法答曰心心數法是也若然者復更有過如依有覺有觀三昧入無覺無觀三昧有覺有觀三昧不應與無覺無觀三昧作次第緣不相似故無覺無觀三昧則不從次第緣生若依無覺無觀三昧入有覺有觀三昧亦如是若然者無解脫何以故欲相應心唯次第生欲相應心不淨觀等及諸善心無由得生若善心不生則無解脫有如是等過如先説者好以何等故名世第一法問曰何故作此論答曰前雖説世第一法體性未説所以名世第一法今欲説故猶如有人世稱言勝未知為以族姓財力眷屬言為勝耶彼亦如是今欲説其所以名世第一名第一者此心心法於餘法為最為勝為長為尊為上為妙以如是等義故名為第一問曰言第一者於世法中為都勝為分勝耶若都勝者彼則不勝見諦邊等智何以故彼等智見道眷屬不相離慧力勝故一切見道慧力偏多復次彼亦不勝淨修勳禪何以故修勳禪者不與凡夫同生一處復次彼亦不勝得盡智時一切善根何以故得盡智時所修善根永離一切諸垢障故復次彼亦不勝空空三昧無願無願三昧無相無相三昧何以故空空三昧等乃至惡賤無漏何況有漏若分勝者彼暖頂忍法亦應言第一答曰或有説者應言分勝何以故唯勝暖頂忍法等故復有説言第一者彼則勝一切凡夫所得禪無量解脫除入一切入乃至第一有中思故或有説者彼則都勝言都勝者非謂一切事業中勝但以能開聖道門故勝彼見道邊等智雖是見道眷屬不相離慧力勝而不能開聖道門如等智淨修勳禪盡智俱生善根空空三昧等不能開聖道門亦復如是或有説者一切都勝以能開聖道門故見道邊等智雖是聖道眷屬乃至慧性偏多若當世第一法不開聖道門者彼則不修若得修者皆是彼世第一法功用之力餘淨修勳禪盡智俱生善根空空三昧等亦復如是問曰第一有何義答曰最勝義是第一義得妙果義是第一義能入勝分破有頂義是第一義最後心義是第一義如高幢頂更無有上問曰上言最勝等有何差別答曰或有説者無有差別所以者何此言皆是歎説上妙之義或有説者以善根故而有差別於不淨安般名為最於聞慧名為勝於思慧名為長於暖法名為尊於頂法名為上於忍法名為妙或有説者以地故而有差別若依未至名為最若依初禪名為勝若依中間名為長若依二禪名為尊若依三禪名為上若依四禪名為妙或有説者邊頂義名為最上義名為勝增善義名為長升進義名為尊堅牢義名為上滿足義名為妙復有説者能與苦法忍作次第故名為最勝諸凡夫善根故名為勝逮勝進故名為長勝世俗善根故名為尊無二故名為上與無漏相應故名為妙復有説者以最故名勝以勝故名長以長故名尊以尊故名上以上故名妙復有説者是凡夫最後心故名為最猶如樹端能開聖道門故名為勝根猛利故名為長於達分善根中勝故名為尊折伏煩惱名為上得好果故名為妙復次此心心法捨凡夫性者問曰捨凡夫性為世第一法為苦法忍耶若世第一法捨凡夫性者云何於一剎那以凡夫法捨凡夫性若以苦法忍捨凡夫性者為以生時捨為以滅時捨若以生時捨者云何未起法能有所作若以滅時捨者彼已滅已復何所捨答曰或有説者即彼世第一法時捨問曰若然者云何於一剎那以凡夫法捨凡夫性答曰凡夫性世第一法相妨礙是故住世第一法時捨猶如象師乘象策象馬師船師勝怨之人亦復如是復有説者苦法忍生時捨凡夫性滅時斷見苦所斷十使如燈生時破暗已生燋炷盡油問曰若爾者云何未起法能有所作又一法不應能作二事答曰若然者有何過一切內法有二種於未來中能有所作相應者苦法忍是也不相應者生相是也一切外法於未來世能有所作唯燈是也或有説者世第一法苦法忍共捨凡夫性世第一法如無礙道苦法忍如解脫道世第一法與凡夫性成就得俱滅苦法忍與不成就得俱生世第一法依苦法忍苦法忍助其勢力能捨凡夫性譬如羸人依因健者能伏怨家彼亦如是得聖法者苦法忍是也捨邪性者世第一法是也問曰邪性有三種一趣邪性二業邪性三見邪性趣邪性者三惡趣是也業邪性者五無間業是也見邪性者五見是也於此三種邪性為捨何等若捨趣業邪性者爾時則不成就若捨見邪性者道比智現在前爾時乃捨答曰三種俱捨問曰云何俱捨答曰不趣不作不行名為捨不趣者捨趣邪性不作者捨業邪性不行者捨見邪性問曰若然者住上忍時已捨何故乃言住世第一法捨耶答曰破其所依故諸煩惱以凡夫性為所依能起生死過患猶如師子依於窟穴能害諸狩彼亦如是是故説住世第一法時捨或有説者苦法忍是邪性對治問曰趣邪性業邪性是修道所斷何以乃言苦法忍是其對治耶答曰對治有衆多有捨對治有斷對治有持對治有不作對治有不趣對治苦法忍是凡夫性捨對治斷見苦十使是斷對治諸無漏道是持對治不作無間業及餘不善業是不作對治不趣惡道是不趣對治如是等名捨邪性得正性者苦法忍是也得正決定者見道是也問曰一切聖道是正決定何故獨稱見道是也答曰或有説者諸煩惱令衆生善根不熟愛潤增長染著不離彼見諦道能令衆生善根成熟乾竭愛水離諸染著不作覆障不為所壞不雜餘心是故見道名正決定或有説者衆生根熟入於聖道是故見道名正決定復有説者拔煩惱根入於聖道是故見道名正決定復有説者捨五人種入八人性是故見道名正決定或有説者扶持長養名正決定猶如牛馬因於水草長養性命一切聖人因於見道長養慧命是故見道名正決定或有説者此法解縛永更不繫是故見道名正決定或有説者正必定義是決定義自有決定而非正所謂邪定是故必定名正決定或有説者相應如法義是決定義見道相應如法故名正決定問曰諸正是正性耶答曰諸正性彼正也頗正非正性耶答曰有世第一法是也問曰以何等故世第一法是正而非正性耶答曰或有説者衆生無始已來煩惱惡行邪見顛倒惱亂此心住世第一法而能制伏是故名正體是有漏為使所使不名正性復有説者等義是正義猶如稱懸在中物偏則低如是世第一法等住凡夫性見道中間若苦法忍生聖道偏多是故等義是正義也復有説者等義是正義佛辟支佛阿羅漢等住上上法故是故等義是正義也復有説者等現前行義是正義一切行人皆同住一剎那故復有説者彼世第一法與苦法忍四事同等所謂地根行緣地者如苦法忍依何地與何根相應行何行緣何法彼亦如是與苦法忍四事同故名為正體是有漏為使所使不名正性
