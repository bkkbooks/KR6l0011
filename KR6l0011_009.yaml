body:
  text: 云何名身云何句身云何味身乃至廣説問曰何以故作此論答曰彼作經者意欲爾乃至廣説復有説者彼尊者迦旃延子於此經中現種種事善於義相或有人疑彼但善於義不善於文為斷如是等疑欲現於文義中俱得自在故作此論復有説者如聲論家欲令字是色法字體是聲聲是色陰所攝為斷如是意故作如是説字是心不相應行行陰所攝復有説者此名身句身味身能照煩惱出要法所以者何若稱煩惱名當知此法是煩惱若稱出要名當知此法是出要以名身句身味身能顯照煩惱出要法故而作此論復有説者以覺知名句味等法故有三種菩提差別其事云何答曰若增上慧覺知名等法是名為佛若以中慧名辟支佛若以下慧名曰聲聞復有説者以覺知名等法故名佛一人為無量説法者復有説者若不能觀察名句味身生大過患若能觀察生大善利其事云何若不能觀察名句味身則煩惱惡行之河常流不絶如罵琉璃太子言婢子何以升釋種堂彼以不能觀察四五字故與百千衆生墮惡道中彼若能觀察四五字者如山等惡行亦能堪忍以不觀察故有如是折減問曰行者得他罵時云何觀察名身等令恚心不生答曰或有説者阿拘盧奢秦言是罵拘盧奢秦言喚聲行者作如是念我今不應念是阿字所以者何若有阿字是名為罵若無阿字名曰喚聲若我不念是阿字者使他人終日竟夜常作喚聲於我何為生瞋恚心復有説者行者作如是念若以如是等字罵我於此方是卑陋語於他方是嘆美語我若於此方卑陋語中生於憂苦於異方語生喜樂者我則常憂常苦常喜常樂誰有苦人與我等者以是事故不生恚心復有説者罵我者以是等字行者作是念讚嘆我者為以是字更有異字諦觀察之更無異字但此諸字次第顛倒言是罵是讚我今何為於是字中而生瞋恚復有説者行者作如是念若人罵我以一界少入一入少入一陰少入餘不罵我者十七界一界少入十一入一入少入四陰一陰少入如是不罵我者多罵我者少而我何為生瞋恚心復有説者行者作是念此罵名誰所成就為是罵者為是受罵者推之應是罵者成就若然者便是自罵於我何為而生瞋恚復有説者行者作是念若以一字則不成罵二字則成無有能一時稱二字者若稱後字時前字已滅不至後字如是但以意分別故言是罵者是受罵者以是事故不生瞋心復有説者行者作是念罵者及我一時同一剎那滅後生諸陰亦無罵者及受罵者罵法不可得故是以不生恚心復有説者行者作是念罵者受罵者皆悉是空所以者何無我無人無衆生無壽命無作無作者無受無受者但有諸陰空聚是故不生瞋心行者應以如是等法觀名身句身味身問曰何以復依名句味身作論耶答曰欲現此經文義具足故而作此論復有説者以依此文能顯明陰界入中衆多之義亦能讚嘆佛法僧寶以是事故而作此論云何名身名身胡音有三種一語名名二語名名身三語以上名多名身一語名名者一法一名二語名身者二法二名三語以上名多名身者三法三名以上名多名身句身味身亦如是此所問名身者問多語名身也問曰何以問多語名身不問名不問名身耶答曰彼作經者意欲爾乃至廣説復有説者應問而不問者當知此是有餘之説復有説者名與名身悉入多語名身中是故問多語名身不問名與名身答曰名者稱語種種語增語想數施設世所傳説是謂名如是等語盡説是名問曰何故問多名身而答名耶答曰以名成滿多名身故多名身還成滿多名身復次名能生多名身多名身還生多名身是故問多名身答名問曰名多名身體性是何答曰是心不相應行已説體性所以今當説何故名名答曰名者亦名隨亦名求亦名合天竺名音中含此三義隨者隨其所作有如是名求者以是名求有此物應復次求者四陰名求以四陰能取諸界能取諸趣能取諸生是故名求合者於義於造相應故名合問曰何故名多名身答曰衆多名合聚故名多名身如一鳥不名多鳥身衆多鳥名多鳥身馬等亦如是如是一名不名多名身衆多名合集名多名身句身味身當知亦如是如是有名有名身有多名身名者有一字名二字名多字名一字名者名曰名二字名者名曰名身多字名者或説三字或説四字名多名身二字名者亦名名四字名名身或六字或八字名多名身三字名者亦名名六字名名身或九字或十二字名多名身四字名者亦名名八字名名身或十二字或十六字名多名身如是乃至多字立門亦爾如名身味身當知亦如是云何句身此問多句身答曰隨句義滿現如是事是名句身所以引偈者為作證故如説諸惡莫作諸善奉行自淨其意是諸佛教彼諸惡莫作是初句乃至廣説隨句義滿者滿偈義也現如是事者顯明如是事也是名句身此偈有説有解如説諸惡是説莫作是解下諸句亦如是説如説諸惡於説是足於解不足於句不足於偈不足莫作於説於解於句足於偈不足乃至是諸於説於解於句足於偈不足佛教於説於解於句於偈足此是偈中不長不短八字為一句三十二字為一偈此結偈法名阿䨲吒闡提是經論數法亦是計書寫數法六字為句者名初偈二十六字為句者是後偈或有減六字為句者此偈名周利荼若過二十六字為句者此偈名摩羅云何味身答曰字説是味身所以引偈者為作證故如説欲是偈本字即是味偈依於名造是偈體欲是偈本者云何為欲答曰欲者欲造偈欲作偈是名為欲本者是所起是所因是名為本字即是味者諸字即是味偈依於名者偈依名有造是偈體者造者是作偈者偈從作偈者生如泉出水如乳房出乳偈從造者生故以為體有名有名身有多名身有句有句身有多句身有味有味身有多味身彼一字名者名曰名不名名身不名多名身不名句不名句身不名多句身是名味不名味身不名多味身二字名者名曰名不名名身不名多名身不名句不名句身不名多句身是名味名味身不名多味身彼二字名一字為名者名曰名二字名名身不名多名身不名句不名句身不名多句身是名味名味身不名多味身四字名者名曰名不名名身不名多名身不名句不名句身不名多句身是名味名味身不名多味身彼四字名一字為名者名曰名二字名名身餘二字名多名身不名句不名句身不名多句身是名味名味身名多味身以二字為名者名曰名名名身不名多名身不名句不名句身不名多句身名味名味身名多味身八字名者名曰名不名名身不名多名身是名句不名句身不名多句身是名味名味身名多味身彼八字名以一字為名者名曰名名名身名多名身名句不名句身不名多句身名味名味身名多味身以二字為名亦如是四字為名者名曰名名名身不名多名身名句不名句身不名多句身名味名味身名多味身十六字為名者名曰名不名名身不名多名身名句名句身不名多句身名味名味身名多味身彼十六字一字為名者名曰名名名身名多名身名句名句身不名多句身名味名味身名多味身二字四字為名亦如是八字為名者名曰名名名身不名多名身名句名句身不名多句身名味名味身名多味身三十二字為名者名曰名不名名身不名多名身名句名句身名多句身名味名味身名多味身彼三十二字一字為名者二字為名者四字為名者八字為名者如前説十六字為名者名曰名名名身不名多名身名句名句身名多句身名味名味身名多味身一字一名如上廣説一字二名者名曰名名名身不名多名身不名句不名句身不名多句身名味名味身不名多味身一字四名者名曰名名名身名多名身不名句不名句身不名多句身名味名味身名多味身一字八名者名曰名名名身名多名身名句不名句身不名多句身名味名味身名多味身一字十六名者是名句名句身不名多句身餘如上説一字三十二名者説皆具足二字一名如前説二字二名者名曰名名名身不名多名身不名句不名句身不名多句身名味名味身名多味身二字二名一字為名者如前説四字一名者如前説四字二名者名曰名名名身不名多名身名句不名句身不名多句身名味名味身名多味身彼四字二名一字二字為名者如前説八字一名者如前説八字二名者名曰名名名身不名多名身名句名句身不名多句身名味名味身名多味身彼八字二名一字二字四字為名如前説十六字為一名者如前説十六字二名者名曰名名名身不名多名身名句名句身名多句身名味名味身名多味身彼十六字一名一字二字四字八字為名者如前説問曰名為隨身處所為隨語處所答曰或有説者名隨語處所諸作是説名隨語處所者生欲界中作欲界語語是欲界名是欲界人是欲界所説義或三界繫或不繫生欲界作初禪地語語是初禪地名是初禪地人是欲界所説義或三界繫或不繫生初禪中作初禪地語語是初禪地名是初禪地人是初禪地所説義或三界繫或不繫生初禪中作欲界語語是欲界名是欲界人是初禪所説義如前説生二禪三禪四禪中作初禪地語語是初禪名是初禪人是二禪三禪四禪所説義如前説生二禪三禪四禪中作欲界語語是欲界名是欲界人是二禪三禪四禪所説義如前説問曰諸作是説名隨語處所者名是欲界初禪餘三禪地為有名不答曰或有説者無復有説者有而不可説評曰不應作是説如前説者好復有説者名隨人處若作是説名隨人處者生欲界中作欲界語語是欲界名是欲界人是欲界所説義如前説生欲界中作初禪地語語是初禪地名是欲界人是欲界所説義如前説生初禪中作初禪地語語是初禪名是初禪人是初禪所説義如前説生初禪中作欲界語語是欲界名是初禪人是初禪所説義如前説生二禪三禪四禪中作初禪地語語是初禪名之與人即是彼地所説義如前説生二禪三禪四禪中作欲界語語是欲界名之與人即是彼地所説義如前説問曰若作是説名隨人處者二禪三禪四禪地有名無色界為有名不答曰或有説者無復有説者有而不可説評曰不應作是説如前説者好問曰名為是衆生數為非衆生數耶答曰名是衆生數問曰名者為是長養為是報為是依答曰一切名是依非長養非報問曰若名非報者此經云何通如佛告阿難我亦説名從業生答曰此中説業威勢果言從業生如作好業亦生好名問曰名當言善不善無記耶答曰名當言無記問曰誰成就此名為是説者為是所説法耶若是説者斷善根人亦説善法可成就善耶離欲人亦説不善可成就不善耶若是所説法者非衆生數法及無為法亦是所説法可成就名耶答曰應作是説名是説者成就問曰若然者斷善根人亦説善法離欲人亦説不善法可成就善不善耶答曰不也所以者何彼雖成就善不善法名然名體是無記法聲聞一心能起一語一語不能説一字問曰如説阿此非一字耶答曰爾所時已經多剎那世尊一心起一語一語説一字唯佛世尊其言輕疾言聲無過辭辨第一問曰諸法過去有過去現在未來名耶答曰有過去法有過去名者如毗婆尸佛以如是名説過去法過去法有未來名者如彌勒佛以如是名説過去法過去法有現在名者如今現在以如是名説過去法頗未來法有未來現在過去名耶答曰有未來法有未來名者如彌勒佛以如是名説未來法未來法有過去名者如毗婆尸佛以如是名説未來法未來法有現在名者如今現在以如是名説未來法頗現在法有現在過去未來名耶答曰有現在法有現在名者如今以如是名説現在法現在法有過去名者如毗婆尸佛以如是名説現在法現在法有未