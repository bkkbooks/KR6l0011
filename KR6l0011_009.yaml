來今問曰此三種名説法體性是何答曰如波伽羅那説三種名説法體性攝十八界十二入五陰問曰如波伽羅那説三種説法體性攝十八界十二入五陰所説是語所顯是名應是一界一入一陰少入云何説攝十八界十二入五陰答曰或有説者取三種名説法及眷屬故其事云何答曰語能生名名能顯義故説及其眷屬復有説者為三義説法故言三名説法所以者何説者聽者皆為於義以是事故盡攝陰界入問曰何故有為法説是三名説法不説無為法耶尊者和須蜜答曰此經為説有為法有為法不得作第四第五説法復有説者此經為説一切法無為法墮現在世中所以者何以現在法能證得無為法故以是故無為法亦在三種名説法中復有説者若有三性者説是三名説法三性者所謂語名義無為法雖語有義無語無名是故説不在三名説法中問曰何故世尊説世是三名説法答曰或有説者為止外道意故外道於世中愚故復有説者為壞未來世中説無過去未來者意故是故説世是三種名説法復有説者外道作如是説若無我者是人説法終無所為為壞如是意而作是説雖無有我為世故説問曰若為過去説法解未來現在事若為未來説法解過去現在事若為現在説法解未來過去事於三種名説法中為是何名説法答曰或有説者如是説者於三種名説法中是異説復有説者若為過去説法解未來現在事者為過去即過去世解未來現在事即未來現在世攝乃至為現在説過去未來亦如是復有説者若作是説是説三世義若為過去是説過去義解未來現在是説未來現在義未來現在亦如是如經説有三種名説法無第四第五問曰若説三種名説法有説有解於義已足何以復言無第四第五答曰無第四者遮有第四世無第五者決定此義無第五世復有説者無第四者遮第四世無第五者遮無為法復有説者應説四種名説法所謂四聖諦無第五者無第五諦無第六者遮虛空非數滅復有説者應有五種名説法所謂五陰無第六者無第六陰無第七者遮無為法此為三世名説法故無第四第五應有一種名説法所謂作觀無第二第三無第二者無第二作觀無第三者遮作觀所不攝法復有説者應有二種名説法所謂定慧無第三者無第二定若第二慧無第四者遮定慧所不攝法此説三世名説法故無第四第五無第四者遮第四世無第五者遮三世所不攝法以如是數法應説三解脫門説四諦五陰六聖明分想七覺分八道分九次第定十種無學法如來十力應有十種名説法無第十一第十二無第十一者無第十一力無第十二者遮十力所不攝法即彼經説應以四事察人是長老為可與語為不可與語云何為四一不住是處非處二不住智論三不住分別四不住道迹問曰如此四事有何差別答曰或有説者不住是處非處者不如實知是處非處不住智論者不如實知智與不智不住分別者不如實知世諦第一義諦不住道迹者不如實知此身集道迹不如實知此身滅道迹復有説者不住是處非處者如眼色能生眼識乃至意法能生意識名為是處不如實知者名為不住不住智論者不如實知十智不住分別者不如實知了義不了義經不住道迹者不如實知四種道迹復有説者不住是處非處者不能自定所説是處非處不住智論者不能堪忍分別前後問答不住分別者不如實知詭誑真實不住道迹者他如法問心不悅可復有説者不住是處非處者不別有無不住智論者不解智人論不住分別者不知假設無有是處之言不住道迹者無有隨應覺意復有説者不住是處非處者於所言論不別自義他義不住智論者於先所聞執著不捨後所聞義不能觀察不住分別者他説正義心生疑慮如人見蘇謂是米飯不住道迹者不識他人所説次第以前為中以中為後復有説者不住是處非處者不知現前可了不可了事不住智論者不能以比想籌量所論不住分別者不知前後所説次第不住道迹者不解他人所問意尊者婆摩勒説曰不住是處非處者不能定所説不住智論者不知詭誑及與真實不住分別者不堪忍分別前後問答不住道迹者他人如法論心不悅可尊者僧伽婆秀説曰不住是處非處者不知多界經所説是處非處義不住智論者不知四十四智七十七智體分不住分別者不知煩惱出要不住道迹者不如實知色滅道法復應以四事察人是長老應以決定答論作決定答是可與語乃至廣説云何決定答論如問佛是等正覺耶應決定答言是此佛法是善好耶應決定答言是此聲聞是善隨順衆耶應決定答言是一切行無常一切行無我涅槃是寂靜耶應決定答言是是名決定答論問曰何故如是問者作決定答答曰此問於義利益能增長善亦進梵行通達覺意能得涅槃是故如是問者作決定答論云何分別答論答曰若作是問為我説法彼應作是答法亦衆多過去未來現在善不善無記欲界繫色界繫無色界繫不繫學無學非學非無學見道斷修道斷無斷如是等法為説何法如是隨所問應分別答是名分別答論云何反問答論答曰如説為我説法應作是答法亦衆多有過去乃至無斷法於此法中為説何法是名反問答論問曰分別答反問答有何差別答曰若以答而言無有差別若以所問應有差別所以者何問有二種有欲知義故問為觸惱故問若為知義故問為我説法者應作是答法亦衆多有法過去乃至不斷於此法中為説何法若言為我説過去法應作是答過去法亦衆多有善不善無記若作是言為我説善法應作是答善法亦衆多有色乃至識若作是言為我説色法應作是答色亦衆多有不殺生乃至不綺語若作是言為我説不殺生法應作是答不殺有三種從不貪不恚不癡生為説何等若作是言為我説從不貪生者應作是答從不貪生有二種作無作若為知義故問應次第分別顯説若為觸惱故問者應答言法亦衆多為説何法不應語言有過去未來乃至不斷若作是言為我説過去法應作是答過去法亦衆多不應説善不善無記若作是言為我説善法應作是答善法亦衆多不應説色乃至識若作是言為我説色應作是答色亦衆多不應説不殺生乃至不綺語若作是言為我説不殺生應作是答不殺生亦衆多不應説從無貪無恚無癡生若作是言為我説從不貪生者應作是答從無貪生亦衆多不應説作無作如是為觸惱問者應作如是答乃至問盡或時自答如是有求善義故問有試他覺意深淺故問或有求義故問或有輕他故問或有質直故問或有諂曲故問或有情性軟弱故問或有自恃智故問如軟弱問者應分別答若自恃智問者應反問答乃至問盡或時自答云何置答論答曰如諸外道詣世尊所作如是問沙門瞿曇世界是常無常佛言是不應答問曰何故問世界常無常佛不答耶答曰諸外道以人是常往詣佛所作如是問人為是常是無常耶佛作是念畢竟無人若答言無人彼當作是言我不問有無若答言斷常畢竟無人有何斷常如人問他言善男子石女兒為恭敬孝順不彼作是念石女無兒若我答言石女無兒彼當作是語我不問有無若當答言恭敬孝順者石女無兒有何恭敬孝順彼亦如是此問論非是真實以是非有非實故佛不答如是有常無常亦常無常非有常非無常世界有邊無邊亦有邊無邊非有邊非無邊當知亦如是復作是問沙門瞿曇神即身耶佛言是不應答問曰何故佛不答此問答曰諸外道以身是神往詣佛所作如是問沙門瞿曇是身即神乃至廣説佛作是念有身無神若我答言有身無神彼當作是言我不問有無若當答言神異於身畢竟無神云何是身是異如人問他言善男子兔角牛角為等相似耶彼人作如是念兔無角牛有角若我答言兔無角牛有角彼當作是言我不問有無若言等相似兔無有角云何言等相似彼亦如是是問論是有是無是虛是實以是問論是有是無是虛是實故佛不答身異神異亦復如是復作是問沙門瞿曇如來死後為斷為常乃至廣作四句佛言是不應答問曰何故佛不答耶答曰諸外道以神本無今有往詣佛所作如是問沙門瞿曇如此神本無今有已有為是常為是斷佛作是念畢竟無神云何本無今有已有若斷若常是問論非有非實以是問論非有非實故佛不答復作是問沙門瞿曇自作自受耶佛言是不應答問曰何故佛不答耶答曰諸外道以我作我受世尊常説無我復作是問沙門瞿曇他作他受耶佛言是不應答問曰何故佛不答耶答曰諸外道作如是説自在天作我受世尊常説自行果報復作是問沙門瞿曇無作無受耶佛言是不應答問曰何故佛不答耶答曰諸外道作如是説苦樂不從因生佛常説有因有緣問曰如前三答與答法相應此云何名答論乃至不論一句答曰雖無所説此是根本答論所以者何與答理相應乃至不説一句於理善通或有默然於理得勝況有所説而不勝耶曾聞有大論師名奢提羅至罽賓國于時佛迹林中有阿羅漢名婆秀羅具足三明離三界欲通達三藏於內外經論無不究暢時奢提羅聞彼林中有大論師即詣其所到已與尊者婆秀羅共相問訊種種慰勞在一面坐時奢提羅語尊者婆秀羅言誰當先立論門婆秀羅答曰我是舊住應先立論門然汝遠來聽汝隨意先立論門時奢提羅作如是言一切論有報論時婆秀羅聞是語已默然而坐時奢提羅諸弟子輩唱如是言沙門釋子今墮負處從坐欲起而去時尊者婆秀羅作如是言善去汝師若是奢提羅者自知此事從彼林中展轉前行其師作是思惟沙門釋子何故作是言汝師若是奢提羅者自知此事即便自憶我作是言一切論有報彼沙門釋子默然不言便為我論無報沙門釋子已為勝我即如所念告諸弟子今我當往還歸謝之諸弟子言於大衆中今已得勝何須復往時師復言我寧於智者邊負不於愚者邊勝即時還詣婆秀羅所作如是言汝是勝者我墮負處汝今是師我是弟子如是默然而能得勝何況所説如佛世尊責諸弟子言是癡人乃至廣説問曰何以作此論答曰佛世尊無相似愛無相似恚無相似慢無相似無明世尊愛恚已斷離於憎愛斷一切諍訟根本如諸弟子有煩惱習如畢陵伽婆蹉有瞋恚習彼長老罵恆河神言小住弊婢長老阿難則有愛習以憐諸釋子故尊者舍利弗有憍慢習捨隨病藥等如是等習佛世尊永無所以者何已離一切諸無巧便煩惱習故然佛有巧便相似言愛相似言者如説善來比丘快能出家瞋恚相似言者汝是釋種婢子諸釋是汝大家慢相似言者如説我成就十力四無所畏無明相似言者如説大王從何處來如告阿難園林外何以有高聲大聲問曰如來以拔習氣根本何以有如是相似言答曰為守護受化田故其事云何此中應廣説破僧因緣所以者何即是此經根本因緣故諸比丘為提婆達多所壞尊者舍利弗化使還來彼諸比丘生大慚愧兼有疑心我等親近提婆達多所受禁戒將不失耶以慚愧心往詣佛所爾時世尊以親愛軟語而告之言善來比丘快能出家説是語時彼諸比丘皆得除去慚愧及其疑心所以罵菴婆吒言婢子者欲破其憍慢心以破憍慢心故次第二身得生天上見於聖諦所以説我成就十力四無所畏者不知佛功德者欲令知故所以言大王從何處來者欲生談論次第法故所以問園林外有高聲大聲者欲令阿難生間靜親近心故以如是等衆因緣故而作此論何故世尊責諸弟子言是癡人此有二義一是呵責二言是癡人今欲説癡人義故作是説云何名癡人答曰於佛法中生於愚癡佛法者所謂道也問曰云何於道生愚癡耶答曰不能令道愚癡但於自身增長愚癡復有説者亦能令道愚癡所以者何以道遠離故道不得自在故復有説者佛説斷愚癡法是人於此法不斷愚癡反增愚癡故作是説於佛法中生於愚癡無生分別者令佛功用方便無有果實其事云何如婦人不産名無産分如是聞佛所説不受聖道胎者是人於佛法中名無産分無果者無依果解脫果無得者於佛法中無所得故無味者不得出離味間靜味道品味寂滅味故言無味無利者無善果利故譬如良醫四方勤求種種藥草以與病人為除病故而彼病人反以藥草棄糞掃中生二過患一自病不愈二唐捐醫功如是諸佛世尊作百千萬種種苦行勤求無漏聖道之藥為受化者而解説之而聞法者不能修行生二過患一不能自愈諸煩惱病二唐捐諸佛所行功報復次生愚癡者能令自身為非器故名生愚癡復有説者斷佛期心故名生愚癡佛期心者欲令衆生解脫諸苦彼不能修離苦方便故言斷佛期心復有説者斷於佛法令不相續若彼人身修正行亦令他人修於正行如是轉轉令多衆生修於正行若自身不能修於正行亦令他人不修正行如是轉轉令多衆生不修正行如是之人不能利益一身何況多人復有説者本出家所為而不能得名生愚癡復次於佛法中不如義次行言是癡人此中以佛語為佛法行者應如義次行然復不能行故言癡人復有説者如所應行名如義次行彼於佛法中不如所應行名不如義次行不隨順者於佛法中不如法隨順不次第行者於佛法中不作相續行犯衆過惡者犯於佛法不如法行者不行次法謂聖道也復有説者不如義語次行者不於一切時能行如婆他利比丘於三月後乃受不非時食法復有説者不如義次行者此答前説於佛法中生於愚癡云何生愚癡答曰於佛教戒不如義次行乃至不如法修行次法亦如是以何等故佛責諸弟子此答先所説義答曰諸佛世尊常訓誨語如今和上阿闍梨向諸弟子以憐愍意言是癡人佛亦如是以憐愍饒益故言是癡人諸佛世尊常以四事教化一以歎美二以呵責三以因他四以放捨歎美者如歎美億耳等善哉善哉比丘能以清妙之音聲唄頌經法呵責者如呵責優陀耶等因他者如轉法輪時為五比丘説法令八萬諸天得道如頻婆娑羅王迎佛令八萬人天得道如帝釋問佛亦有八萬諸天得道放捨者如犢子性梵志等諸應以呵責教化者若不呵責則不受化以是故佛世尊呵責弟子如阿闍梨向近住弟子和上向同住弟子以苦切語而呵責之而彼和上阿闍梨非是惡心但以不順法故而呵責之如父母見子為非法事欲擁護故以苦切言而呵責之而彼父母無有惡心若當諸子為非法事而彼父母生苦惱心欲制諸子為非法事以苦切語而呵責之佛亦如是不以惡心若當應以呵責受化而不呵責彼人畢竟無有調伏是故世尊而呵責之復有説者佛大悲心重於一切時常作是念以何方便能饒益衆生若如來不呵責提婆達多者諸餘比丘隨從者衆復當數數觸嬈世尊若當向無比女不言如是盛屎尿器彼女欲心無由得息若當不罵菴婆羅吒言是婢子者彼人無由能破憍慢若不罵其師弗迦羅婆羅者亦無由能破憍慢如是等為增益功德故亦呵責餘人復次以二事故呵責餘人一善根不熟者以呵責故令善根熟二善根雖熟不作方便以呵責故令生方便得於道果問曰以何義故言癡人耶為以從癡生故言是癡人為以現行癡故言是癡人若從癡生者阿羅漢亦是癡人何以故阿羅漢身從癡生故若以現行故言癡人者唯阿羅漢得言不癡所以者何阿羅漢不現行癡故若然者此經云何通如説癡人遠去莫我前住評曰應作是論現前行癡名曰癡人問曰若然者唯阿羅漢是不癡人此經云何通乃至廣説答曰此經應如是説速去比丘莫我前住曾聞佛般涅槃時長壽諸天嫌如是事此天德神力比丘今者何以在我前立障我等前使不得見世尊身此是我等最後見世尊身所以者何世尊不久當般涅槃爾時世尊知諸天心所念告比丘言遠去莫我前住復有説者先説應以呵責得度者而呵責之若呵責阿羅漢得勝進者佛亦呵責言是癡人問曰人有愛有恚有慢有見有癡何以言是癡人不言是愛等人耶答曰以癡遍一切處故若行彼地癡即是彼地癡人
