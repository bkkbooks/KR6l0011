front:
  text: 毗婆沙序釋道挻作毗婆沙者蓋是三藏之指歸九部之司南司南既準則群迷革正指歸既宣則邪輪輟駕自釋迦遷暉六百餘載時北天竺有五百應真以為靈燭久潛神炬落耀含生昏喪重夢方始雖前勝迦栴延撰阿毗曇以拯頽運而後進之賢尋其宗致儒墨競搆是非紛拏故乃澄神玄觀搜簡法相造毗婆沙抑止衆説或即其殊辨或標之銓評理致淵曠文蹄豔博西域勝達之士莫不資之以鏡心監之以朗識而冥瀾潛灑將洽殊方然理不虛運弘之由人大沮渠河西王天懷遐廓摽誠沖寄雖迹纏紛務而神栖玄境冉能丘壑廊館林野是使淵叟投竿巖逸來庭息心升堂玄客入室誠詣既著理感不期有沙門道泰才敏自天沖氣疏朗關博奇趣遠參異言往以漢土方等既備幽宗粗暢其所未練唯三藏九部故杖策冒嶮爰至蔥西綜攬梵文義承高旨并獲胡本十萬餘偈既達涼境王即欲令宣譯然懼環中之固將或未盡所以側席虛襟企囑明勝天竺沙門浮陀摩周流敷化會至涼境其人開悟淵博神懷深邃研味鑽仰俞不可測以乙丑歲四月中旬於涼城內苑間豫宮寺請令傳譯理味沙門智嵩道朗等三百餘人考文評義務在本旨除煩即實質而不野王屢回駕陶其幽趣使文當理詣片言有寄至丁卯歲七月都訖合一百卷會涼域覆沒淪湮遐境所出經本零落殆盡今涼王信向發中探練幽趣故每至新異悕仰奇聞更寫已出本六十卷送至宋臺宣布未聞庶令日新之美敞於當時福祚之興垂於來葉挻以微緣豫參聽末欣遇之誠竊不自默粗例時事以貽來哲如來滅後法勝比丘造阿毗曇心四卷又迦旃延子造阿毗曇有八犍度凡四十四品後五百應真造毗婆沙重釋八犍度當且翻時大卷一百太武破沮渠已後零落收拾得六十卷後人分之作一百一十卷唯釋三犍度在五犍度失盡
