body:
  text: 十八界眼界色界眼識界乃至意界法界意識界界名略説亦名廣説略説者於説大經如大因緣經大涅槃經等廣説者於説入經入亦名略説亦名廣説略説者於説界經廣説者於説陰經陰亦名略説亦名廣説略説者於説入經廣説者如説若有所受當知皆苦於如是等經名為廣説復有説者界亦名略説亦名廣説即於界中不於餘法所以者何界中心色是廣説心數法是略説入亦是略説亦是廣説即於入中不於餘法所以者何入中色是廣説心心數是略説陰亦是略説亦是廣説即於陰中不於餘法所以者何陰中色心是略説心數是廣説如説若有所受當知皆苦此説一向是略復有説者界是廣説亦攝一切法大因緣經大涅槃經雖是廣説不攝一切法入雖攝一切法而非廣説所以者何是中説法故陰不攝一切法所以者何攝一切有為法不攝無為法故亦非廣説所以者何是略説故如説若有所受當知皆苦此一向是略説佛所説經廣略義如此非謂如説法施財施是略説大因緣經大涅槃經是廣説世尊於所知法先廣説十八界即於彼所知次略説十二入於彼十二入除無為法略説五陰是名世尊廣略之説以如是廣略所説法佛告尊者舍利弗我説諸法若廣若略能知解者難得以如是廣説略説故尊者舍利弗請於世尊世尊説法若廣若略能有知解法寶者譬如大海中龍於大海中化作大身上升虛空興起大雲遍覆虛空放電光出如是雷音我今當雨藥草樹木聞如是音皆生恐怖作如是念大海中龍若降雨者我等皆當沒滅是時大地心無疑懼又無異色而請之言汝當降雨經百千歲我盡能受世尊亦爾於主童佛然燈佛迦拘遜陀村佛迦那含牟尼佛乃至迦葉佛所長養智身上升有餘涅槃虛空界中以大悲雲遍覆世間放智電光出無我師子吼音作如是言舍利弗我所説若廣若略知解者難得是時一切受化者聞説是言心懷恐懼唯除尊者舍利弗世尊以未曾聞名味句身而説諸法我等所不能解尊者舍利弗於六十劫中增長如地知見心無恐懼又無異色而請於佛世尊説法若廣若略能有知解法寶之者問曰有法非聲聞辟支佛境界何故尊者舍利弗作如是請佛答曰聲聞所知非佛知以聲聞境界非佛境界以聲聞所行非佛所行以聲聞根非佛根復次佛聽故請尊者舍利弗作如是念世尊所説常以憐愍知量觀其田器當雨法雨不唐捐其言若説一句前人不受佛則不説世尊知我有爾所受法器則為我説如是法以是事故佛聽故請問曰為何等受化者説界何等説入何等説陰答曰於界中愚者為説界於入中愚者為説入於陰中愚者為説陰復次受化者或是初行或是已行或是久行為初行者説界為已行者説入為久行者説陰下根中根上根樂廣樂略樂廣略者説亦如是復次若恃性憍慢縱逸者為説界所以者何性義是界義故若恃財憍慢縱逸者為説入所以者何輸門義是入義故恃命憍慢縱逸者為説陰所以者何陰説名殺賊復次於色心愚者為説界所以者何界中廣説色心略説數法於色愚者為説入所以者何入中廣説色略説心心數法於心數法愚者為説陰所以者何陰中廣説心數法略説色心復次為計我者説界為於所依緣愚者説入為我憍者説陰佛為如是受化衆生説陰界入問曰十八界名有十八實體有幾答曰十八界名有十八實體或十七或十二若説六識身則無意界所以者何離六識身外更無意界是故名有十八體有十七若説意界則無六識身所以者何意界之外更無六識身是故名有十八體有十二如名體名假體假乃至知名知體説亦如是問曰十八界體或有十七或有十二者云何立十八界答曰以三事故立十八界一以所依二以依三以境界六界是所依六界是依六界是境界所依者眼界乃至意界依者眼識乃至意識境界者色乃至法問曰若以所依依境界立十八界者阿羅漢最後心則非意界所以者何不能生識故答曰彼亦是意界所以識更不相續者非以意界更以餘事故若識生者亦能作所依過去有十八未來現在亦有十八問曰過去有十八界可爾所以者何六識次第滅者是意界未來現在云何有十八界答曰以是決定相故若未來現在識無意界相者過去者亦無以決定相故過去有十八界是故以三事説十八界謂所依依境界佛經作如是喻如大樹葉聚比丘當知無量界性亦復如是雖説無量界性而不過十八界盡以三事故名界謂所依依境界佛經又説六十二界如多界經説彼亦不過十八盡以三事故名界問曰佛經何故説六十二界答曰欲異外道故外道有六十二見以身見為本為對治彼見故説六十二界餘經又説憍尸迦世間有種種無量界衆生各於自界而起貪著生牢強想言我界勝唯我是實餘者是愚如是盡在十八界亦以三事謂所依依境界復有説者此中諸見以界名説悉在法界中以是事故十八界以三事立界謂所依依境界尊者婆摩勒説曰以四事故故立十八界一以自體二以事三以所作四以分別陰以自體者色界乃至法界事者眼識乃至意識所作者眼界乃至意界分別陰者色陰有十界識陰有七三陰有一界此是界體性乃至廣説已説體性所以今當説何故名界界是何義答曰性義是界義假義分義別義種種相義不相似義分齊義是界義種種所依是界所作聲論者説曰趣義是界義持養義是界義性義是界義者譬如一山之中多有諸性鐵性白鑞性鉛性銅性銀性金性石性白塔性如是一所依身有十八界性假義是界義者如諸材假次第安置名宮殿樓觀次第安置竹篾名扇名蓋次第安置肉假名為男女分義是界義者十八分是男十八分是女別義是界義者男別有十八女別有十八種種相義是界義者眼界相異乃至法界相異不相似義是界義者眼界於餘界不相似乃至法界於餘界不相似分齊義是界義者眼界自有分齊餘十七界亦有分齊乃至法界自有分齊餘十七界亦有分齊種種所作是界所作者眼界所作乃至非法界所作法界所作乃至非眼界所作聲論者説趣義是界義者趣諸界諸趣諸生持養義是界義者能持自性故是故性義乃至持養義是界義已總説界所以今當一一別説云何眼界若眼已見色今見色當見色已見色是過去今見色是現在當見色是未來及諸餘彼分眼外國法師作如是説彼分眼有四種過去有彼分眼界謂眼不見色滅墮過去者現在亦有彼分眼界謂眼不見色今滅者未來亦有彼分眼界謂眼不見色當滅者及未來必不生彼分眼罽賓沙門説彼分眼有五種三種如先説未來必不生彼分眼有二種一與眼識合二不與眼識合若以眼見色於己名自分於餘一切衆生亦名自分若眼不見色於己名彼分於餘一切衆生亦名彼分復有説者若以眼見色於己名自分於餘一切衆生名彼分若眼不見色於己名彼分於餘一切衆生亦名彼分復有説者若以眼見色於己名自分於餘一切衆生不名自分亦不名彼分若眼不見色於己為彼分於餘一切衆生非自分亦非彼分不應作是説云何是眼不名自分亦非彼分評曰如前説者好若以眼見色於己為自分於餘衆生亦名自分若眼不見色於己名彼分於餘衆生亦名彼分問曰無有以他眼見色者云何己眼於餘衆生名為自分耶答曰誰説以他眼見色者耶問曰若無説以他眼見色者云何己眼於餘衆生名為自分耶答曰以所作同故如己眼見色已滅於餘衆生亦名見色已滅無有以他眼見色者問曰自分眼見色彼分眼不見色不見色眼於見色眼云何名彼分答曰展轉為因故見色眼與不見色眼作因不見色眼與見色眼作因復次以展轉相生故見色眼能生不見色眼不見色眼能生見色眼復次展轉相續故見色眼續不見色眼不見色眼續見色眼復次見色眼不見色眼俱是一界一入一根一見諸界有如是相者此中略説如眼界耳界鼻舌界身界説亦如是云何色界答曰若色為眼已見今見當見已見者是過去色今見者是現在色當見者是未來色及餘彼分色彼分色有四種過去有彼分色界謂不為眼所見已滅者現在有彼分色界謂不為眼所見今滅者未來有彼分色界謂不為眼所見當滅者及未來必不生色有色界於一衆生是自分於二三乃至百千衆生是自分色界於一衆生乃至百千衆生是自分者如初生月若生緣彼眼識是自分色界若不生緣彼眼識是彼分色界譬如大會之中有一端正莊嚴伎女在中種種舞戲若生緣彼眼識是名自分色界若不生緣彼眼識是名彼分色界大衆之中升立坐法師説法亦復如是有色界於一衆生是彼分於二三乃至百千萬一切衆生是彼分謂如須彌山中色大海大地中色問曰如是色界非天眼境界耶答曰雖是境界以不用故然有天眼者不必一切時見所應見色問曰彼色不為佛眼所見耶答曰是所見以不用故如今無佛無佛眼見色問曰若以眼見色於己是自分於餘一切衆生亦是自分何故色界若為眼所見是自分不為眼所見是彼分耶答曰一色界容有一衆生不見二三衆生則見無有一眼二人用見何況多耶色界有如是相者此中略説如色界聲香味觸界説亦如是以世俗言説故作是説世俗作如是語汝所嗅香我亦嗅之汝所嘗味我亦嘗之汝所覺觸我亦覺之實義不爾若一人已嗅香第二人所不能嗅一人已嘗味第二人所不能嘗一人已覺觸第二人所不能觸若世俗言説文説如上若以實義文應如是説如眼界耳界鼻界香界舌界味界身界觸界説亦如是云何眼識界答曰眼緣色生眼識問曰眼識生時除其自體餘一切法皆作緣何以但説眼色作緣耶答曰此説眼識所依及境界眼是彼所依色是彼境界復次與眼識作近威勢緣者説眼色與眼識作近威勢緣勝於自體生老無常是以故説問曰眼識亦緣色生何以但言眼識不言色識答曰如外入經説緣色生識是名色識乃至廣説問曰但一經説色識餘經多説眼識答曰若是內法則説不説外法如內外所依所緣根根義所境界境界不共共説亦如是復次識以所依故有別名從眼生者名為眼識乃至從意生者名為意識如聲以所依故有別名如鼓聲依鼓貝聲依貝琴聲依琴彼亦如是問曰此皆依意何以不盡依名意識耶答曰若依是不共不同別異相作識別名云何眼識所依不共不同別異謂依於眼不依餘乃至身識説亦如是以是事故而作四句或作所依不作次第緣乃至廣作四句作所依不作次第緣者謂俱生眼作次第緣不作所依者謂前次第滅心數法作所依作次第緣者謂意界不作所依不作次第緣者除上爾所事乃至身識説亦如是若為意識作所依亦為意識作次第緣耶答曰若作所依亦作次第緣頗有作次第緣不作所依耶答曰有前次第滅心數法尊者和須蜜説曰亦緣色生識何故不言色識但言眼識答曰眼為識作所依非色復次眼所作勝復次眼在自身中色則不定復次眼是內入色則不定復次眼屬內色則不定復次眼於識有損益色則不爾問曰若然者色亦有損益答曰一色雖有損益餘色能生眼識眼不爾若一眼壞更無餘眼能生識餘識説亦如是復次眼有上中下識亦有上中下色則不爾復次眼所不共色則不定如緣一界中色生二界中識無有依一界中眼生二界中識緣一趣中色生五趣中識無有依一趣中眼生二趣中識何況多四生説亦如是復次眼是威勢非色尊者佛陀提婆説曰若眼無留難識亦無留難問曰色若有留難識亦有留難若無色者識何緣生答曰不爾境界常不壞所依有壞若所依壞者識則不生假令有那由他色若所依壞緣色識不生者識則住不生法中問曰眼識識色何故言眼識色耶答曰或説