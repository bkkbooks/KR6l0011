body:
  text: 迦旃延子造五百羅漢釋北涼天竺沙門浮陀跋摩共道泰等譯雜揵度無慚愧品第五云何無慚云何無愧如此章及解章義此中應廣説優波提舍問曰何故作此論答曰以此二法所行相似故世人見行無慚言是無愧見行無愧言是無慚此二法實異人謂是一欲説其定體亦説差別故而作此論復有説者以此二法能壞世人世尊亦説有二黑法能壞世人謂無慚無愧復有説者以此二法行不善法時勢力最勝如説與何纏相應此心淳是不善謂無慚無愧復有説者以此二法令衆生有種種差別相如説若世無此二法則衆生無種種差別相謂豬羊雞犬等復有説者阿毗曇以此二法一心中可得是故尊者迦旃延子欲説其體及差別相故而作此論云何無慚答曰若無慚無慚分乃至廣説如是等盡説一無慚體而文有種種問曰雖説無慚體亦應説其所行答曰如不善所行無慚所行亦如是所以者何與不善法相應故問曰此為何所緣耶答曰緣於四諦復有説者先説所行未説其體問曰若然者體是何耶答曰自身即是其體何以知之如説自身法是自相似法是總相諸作是説先説是所行者應作四句初句者無慚行餘所行是也第二句者行無慚所行無慚相應法是也第三句者無慚行無慚行是也第四句者即是無慚行餘行相應法是也若不爾者除上爾所事如無慚行作四句餘行亦應作四句復有説者先説所緣未説其體未説所行如説無慚無慚分無惡賤無惡賤分是緣苦集諦如説不尊重不善尊重不避他不善避他是緣滅道諦云何無愧答曰無愧無愧分無愧他乃至廣説如是等盡説一無愧體而文有種種問曰若然者所行云何答曰如不善法所行無愧所行亦如是餘如無慚説問曰所緣云何答曰緣四聖諦廣説如無慚諸作是説先説是所行者亦應作四句初句者無愧行餘行是也第二句者無愧相應法行無愧行是也第三句者無愧行無愧行也第四句者即無愧行餘行相應法是也若不爾者除上爾所事如無愧行作四句餘行亦應作四句復有説者先説所緣未説其體未説所行如説無愧無愧分不愧他不數數愧無羞無羞分不羞他是緣滅道諦如説行惡不畏行惡不怖不見惡事可畏怖是緣苦集諦問曰無慚無愧有何差別何故復作此論答曰以此二法相似故雖説其體相而故須説差別不避他是無慚不見惡事可畏怖是無愧復次不尊重是無慚不見惡事可畏怖是無愧復次不惡賤煩惱是無慚不惡賤惡行是無愧復次自於身作惡是無慚於他身作惡是無愧復次若於一人前作惡不羞是無慚於多人前作惡不羞是無愧復次造智者所呵責因時不羞是無慚造智者所呵責果時不羞是無愧是名差別問曰如此惡法何以不名為使耶答曰此所行麁使性微細復次此習氣不牢固如燒樺皮使習氣牢固如燒佉陀羅木復次此不能自立使能自立復次此依於使無慚依貪欲無愧依無明使是根本以是事故不名為使云何為慚云何為愧乃至廣説問曰何故作此論答曰此二法所行相似世人見行於慚名之為愧見行於愧名之為慚此二法實異人謂是一欲説其定體亦説差別故而作此論復有説者慚愧是無慚無愧近對治先説無慚無愧今説慚愧是彼近對治復有説者此是佛經佛經中説有二白法守護世人所謂慚愧若世人無此二法則謂不施設父母兄弟姊妹男女眷屬有衆生種種形差別謂豬羊雞犬驢馬狐狼等禽狩以有此二法故施設有父母兄弟姊妹男女眷屬亦應有豬羊等種種形差別佛經雖説慚愧不分別其體亦不説差別佛經是此論所為根本彼中所不説者今欲説故而作此論云何為慚若慚慚分乃至廣説如是等語盡説慚體如上所説問曰慚體如此所行云何答曰如善法所行此亦復爾與一切善法相應故問曰為緣何法答曰緣一切法諸作是説先説是所行者應作四句初句者慚行餘行是也第二句者慚相應法行慚所行是也第三句者慚行慚是也第四句者即慚相應法行餘行是也若不爾者除上爾所事如是餘行亦應作四句復有説者此説所緣如説慚慚分惡賤惡賤分此緣苦集諦尊重善尊重避他善避他能制惡事是緣滅道諦云何愧答曰若愧愧分愧他乃至廣説如是等語盡説愧體問曰若已説體所行云何答曰如諸善法所行此亦復爾乃至廣説若作是説先説是所行者應作四句初句者愧行餘行是也第二句者愧相應法行愧所行是也第三句者愧行愧是也第四句者即愧相應法行餘行是也若不爾者除上爾所事餘行亦應作四句復有説者此説所緣如説愧愧分愧他羞羞分羞他是緣滅道諦如説見可惡事是可怖畏是緣苦集諦問曰慚愧有何差別何故復作此論答曰以此二法相似故雖説其體相故須説差別避他是慚見惡事可畏是愧餘答與上相違是慚是愧有無慚與慚相似有慚與無慚相似有無慚與無慚相似有慚與慚相似無慚與慚相似者不可慚事而慚慚與無慚相似者不可慚事而不慚無慚與無慚相似者可慚事而不慚慚與慚相似者可慚事而慚愧説亦如是界者無慚無愧在欲界慚愧在三界若是無漏不繫如法身論説信力乃至慧力是學無學非學非無學慚愧力是非學非無學復有説者慚愧是學無學非學非無學人者凡夫人有聖人亦有以有此法故當知是有漏無漏云何增上不善根云何微不善根乃至廣説問曰何故説增上不善根不説中耶答曰或有説者彼作經者意欲爾乃至廣説復有説者應作是問云何增上不善根云何中云何微而不説者當知此説有餘乃至廣説復有説者已説初後當知亦略説中間復有説者已説在此二中根所以者何若説上當知中分在微分中若説微當知中分在上分中復有説者若易見易知者則説中法難見難知是故不説復有説者若是世現見者即説若不現見則不説世尊必知二法謂上與微何以知之如説利根者謂央掘魔羅鈍根者謂薩波達婆而不説中者復有説者若説於中則文重不便若不説中則文輕便云何增上不善根答曰不善根能斷善根者乃至廣説問曰斷善根者是邪見何以言是不善根耶答曰或有説者不善根斷善根方便時勢勝所以者何一切內外法方便時功勝於成時如菩薩見衆生老病死苦發菩提心此心能荷負三阿僧祇劫善行使不散壞亦無留難此心甚難後得盡智三界善根未來中修未足為難復有説者邪見所以能斷善根皆以不善根力不善根能令善根羸劣微薄更無勢力亦令因緣多諸留難然後邪見能斷善根復有説者此文應如是説不善根能斷善根何等不善根答言邪見相應癡不善根亦斷欲界欲時最初滅者是也問曰斷欲界欲不應言亦所以者何即是一答故答曰或有説者此答前所説何等邪見能斷善根答言離欲界欲時初滅者云何微不善根答曰斷欲界欲時最後滅者彼滅已得名無欲問曰不善根斷善根時為一種斷為九種斷若一種斷者此説云何通如説云何微善根答言善根斷時最後滅者彼滅得名善根斷若九種斷者此文云何通如説云何增上不善根斷欲界欲時最初滅者云何以一種不善根斷九種善根答曰或有説者一種斷問曰若然者此文云何通如説云何微善根答言斷善根時最後滅者彼滅得名善根斷答曰此以現在不行故作如是説如上上善根先不現在前後得不成就乃至第八善根亦如是彼下善根於一時得二種現前不行亦得不成就所以者何若斷下下善根時於下下善根一時得二種一不現前行二得不成就於八種善根得不成就不得不現前行本已得故以次第得不現前故而作是説斷善根時最後滅者彼滅得名善根斷以一時得九種不成就故而作是説斷欲界欲時最初滅不善根以是義故此二説善通復有説者九種斷問曰若然者此説云何通如説斷欲界欲最初滅者乃至廣説答曰有多名九種有因九種有對治九種有報九種有善根斷九種因九種者如下下善根乃至能為上上善根作因上上與上上作因不為餘者對治九種者如下下對治道斷上上煩惱上上對治道斷下下煩惱報九種者如施設論所説修行上上殺生生阿毗大地獄中轉減者生熱地獄中乃至轉轉減者生畜生餓鬼中善根斷九種者如下下邪見斷上上善根乃至上上邪見斷下下善根若以斷善根邪見則有九種若以離欲邪見則有一種所以者何斷善根九種邪見時盡從離欲一種中起故下下邪見斷上上善根上上邪見斷下下善根以盡從一種中起故此二説善通問曰斷善根體是何耶答曰是不成就不隱沒無記心不相應行行陰所攝所以者何邪見斷善根非如刀之斷木若斷善根邪見在彼身中時成就善根得則滅不成就善根得則生以無善根得故名斷善根復有説者能斷善根邪見則是其體若作是説當知斷善根體是染污法餘義如上頂退中説問曰何處斷善根答曰閻浮提弗婆提瞿陀尼能斷善根尊者僧伽婆修説曰唯閻浮提能斷非餘方所以者何如閻浮提人於善分猛利於不善分亦猛利問曰若然者此文云何通如説閻浮提成就諸根極多有十九極少八如閻浮提弗婆提瞿陀尼亦如是彼作是答此文應如是説弗婆提瞿陀尼極多十九極少十三閻浮提如先説評曰不應作是説如前説者好如此文義閻浮提極多十九極少八弗婆提瞿陀尼亦如是問曰為男子能斷善根為女人耶答曰如施設論所説以三事勝故能斷善根女人三事不如一男子造業勝於女人二男子欲有所作勝於女人三男子能令諸根利勝於女人是故男子能斷女人不能問曰若然者此文云何通如説若成就女根必成就八根彼作是答此文應作是説若成就女根必成就十三根評曰不應作是説如是説者好男子女人俱能斷善根如此文義若成就女根必成就八根若女人作斷善根方便重於男子如旃遮婆羅門女謗於世尊問曰為愛行人能斷善根為見行人能斷善根耶答曰見行人能非愛行者所以者何愛行人於煩惱法不堅固於出要法亦不堅固見行人行惡堅固是故見行人能斷善根非愛行人問曰黃門般吒無形二形能斷善根不耶答曰不能所以者何見行人能彼是愛行多恚人能彼是多欲復有説者彼心輕躁故不能斷善根問曰斷何界善根耶答曰欲界善根問曰若然者此説云何通如説若人殺折腳蟻子無有悔心當言此人斷三界善根答曰此文應如是説此人當言斷三界中善根而不説者有何意答曰欲令三數滿故成就欲界善根不成就色無色界善根若斷欲界善根則三界善根不成就以是義故為滿三數故作如是説復有説者以色無色界善根依欲界善根故復有説者若此不斷彼則生長若此斷者彼則乾萎復有説者復更得不成就故所以者何令彼轉更遠故問曰為斷生得善根為斷方便善根耶答曰斷生得善根非方便所以者何方便善根先已不成就故問曰為緣有漏邪見斷善根為緣無漏邪見斷善根耶答曰有漏緣非無漏緣所以者何無漏緣使其性羸劣有相應使無緣使故有漏緣使其性強盛有緣使相應使故問曰為自界緣邪見斷善根為他界緣邪見斷善根耶答曰自界緣者所以者何如前所説故問曰為謗因邪見斷善根為謗果邪見斷善根耶答曰或有説者謗因者能所以者何如説殺折腳蟻子無有悔心當知是人斷善根者復有説者謗果者能斷善根所以者何如説若決定言無善惡果報當知是人斷三界善根評曰俱能斷善根如是説者好所以者何謗因者如無礙道謗果者如解脫道謗因者與成就得俱滅謗果者與不成就得俱生是故俱能斷善根問曰何故以折腳蟻子為喻耶答曰以無過於人故殺無過者猶無悔心況有過者是故引以為喻問曰住戒人斷善根時為先捨戒後斷為俱耶答曰或有説者先捨戒後斷善根所以者何彼人身中有一邪見生捨戒後一邪見生斷善根喻如猛風吹樹先折其枝葉後拔其根彼亦如是評曰應作是説若捨彼能生戒心當知戒亦捨問曰善根還相續時為九種一時相續為一一種續耶答曰或有説者一一種續復有説者地獄中死還生地獄中三種相續生畜生餓鬼中六種相續生人天中九種相續生評曰如是説者好一時九種相續次第現在前喻如病人一時除病漸漸生力彼亦如是問曰善根為斷者多為相續者多耶答曰隨其所斷還有爾許相續若斷欲界善根還欲界善根相續若斷生得善根還生得善根相續問曰若斷善根於現法中還能令相續不耶答曰如説此人於現法中不能還令善根相續決定地獄中生地獄中死還能令善根相續問曰何等人地獄中生時相續何等人死時相續耶答曰或有説者若於中陰中乃至死時受邪見報以報盡故死時善根還相續若中陰中不受邪見報者則生時善根還相續所以者何如邪見與善根相妨報亦復爾復有説者或有以因力斷善根者或有以緣力斷善根者若以因力斷善根者死時相續若以緣力斷善根者生時相續復有説者或有自力斷善根者或有他力斷善根者若以自力斷善根者死時相續若以他力斷善根者生時相續復有説者或以常見或以斷見若以常見死時相續若以斷見生時相續尊者瞿沙説曰生地獄中時不無報現在前彼作是念我自作此業當受此報若受彼報亦作是念是時善根還相續復有説者現法中能令善根還相續尊者佛陀提婆作如是説何等人於現法中能令善根還相續何等人轉身答言若得如是善知識多聞能為是人説次第法語如是言若於我有信敬心於諸梵行者亦應生信敬心若能生信敬心者當知是人於現法中能令善根還相續何等人轉身者斷善根人有作無間罪者有不作者若不作無間罪是人現法中還令相續若作無間罪是人轉身或有破見破戒或有破見不破戒若破見不破戒是人現法若破見破戒是人轉身破其心破方便當知亦如是問曰若現法能生善根者彼所説云何通如説此人於現法不能還生善根答曰此説斷善根作無間罪者若於現法還相續者是名成就善根亦現在前若死時生時還相續者是名成就不能令現在前若於現法還相續者不必生地獄中問曰若於現法中還令相續者能得正決定不耶答曰或有説者不能所以者何以彼身中曾斷善根故使善根羸劣善根羸劣故不能得正決定而故能生達分善根復有説者能生達分善根得正決定乃至能得阿羅漢果如優仇吒婆羅門居士曾斷善根尊者舍利弗還令其人生於善根得正決定是故當知能生達分善根乃至亦能得阿羅漢果問曰殺斷善根人殺折腳蟻子何者罪重耶答曰或有説者若住等纏其罪亦等是為折腳蟻子斷善根人其量正等復有説者殺折腳蟻子罪多於彼所以者何折腳蟻子不斷善根彼人斷善根如是説者呵責斷善根者若以殺生殺折腳蟻子罪重若以得罪殺人罪重所以者何若殺於人則得邊罪若殺折腳蟻子不得邊罪問曰於何處受斷善根邪見報耶答曰於阿毗地獄受如阿羅漢所趣最上到於涅槃斷善根者所趣最下到阿毗獄問曰諸斷善根盡住邪定聚耶答曰如是若斷善根盡住邪定頗有住邪定不斷善根耶答曰有如阿闍世王是也復有作四句者或斷善根非邪定或邪定不斷善根乃至廣作四句初句者富蘭那等自言是佛六師是也第二句者阿闍世王是也第三句者提婆達多是也第四句者除上爾所事問曰為不起斷九種善根為數數起斷九種善根耶答曰或有説者不起斷諸善根如見道中不起彼亦如是復有説者或有斷一二三善根而起已復斷評曰不應作是説如説不起者好云何欲界增上善根云何微乃至廣説問曰何故問欲界繫善根不問色無色界耶答曰或有説者作經者意欲爾乃至廣説復有説者此問初起方便入法如問欲界當知亦問色無色界亦不説者當知此問有餘復有説者先説不善根誰是不善根近對治所謂欲界善根也是故問之復有説者若易見易施設者則問色無色界增上善根雖易見易施設而微者難見難施設所以不問復有説者欲令經文便故色無色界增上善根雖易顯現而微者難見若顯現者經文煩亂所以者何無斷善根法故欲界有斷善根法故若説微者則經文不煩是以問之云何欲界繫上上善根答曰菩薩得正決定時見道邊所得等智如來得盡智時得欲界無貪無恚無癡善根問曰何故見道邊等智得盡智時善根此二法等而論耶答曰或有説者此不等論但欲説見道邊等智於見道邊等智勝者得盡智時善根於盡智時善根勝者所以者何如辟支佛所得見道邊等智則勝聲聞如佛所得見道邊等智則勝辟支佛辟支佛得盡智時善根則勝聲聞佛得盡智時善根則勝辟支佛以是義故欲説見道邊等智於見道邊等智勝故乃至廣説復有説者此二法等而論之俱能摧伏過於有頂而得之故所以者何摧伏出過見道所斷有頂得見道邊等智摧伏出過修道所斷有頂得盡智時善根以是義故等而論之復有説者欲説轉勝法故如辟支佛得見道邊等智則勝聲聞得盡智時善根菩薩得見道邊等智則勝辟支佛得盡智時善根問曰若然者云何言聲聞辟支佛有增上善根耶答曰以身勝故説增上如在辟支佛身中則勝聲聞如在佛身中則勝辟支佛復有説者有二道見道修道若以見道力得佛亦勝若以修道力得佛亦勝復有説者此中亦不説勝亦不説等但説二種善根問曰如菩薩得正決定已得此等智何以言得正決定時耶答曰或有説者此文應如是説菩薩得正決定已得此等智而不説者有何意答曰此中得決定已言得決定時已來言來如説大王從何處來廣説如上復有説者得決定時得此等智所以者何此智苦比智時修從苦比忍決定得苦比智時故集比忍集比智滅比忍滅比智亦如是同於所緣未休息故問曰何故言此智是見道邊耶答曰以二事故一從見道中得二從見道後邊得行人見道中得故言見道中見苦集滅最後得故言後邊問曰如此法體是四陰五陰何以説名為智耶答曰此中智分多從多分故説名為智如見道亦體是五陰以見分多故説名見道四道通金剛喻定此智亦如是問曰見苦邊欲界等智見集邊欲界等智此二何者為勝答曰以見集邊等智在勝身中故勝所以者何見集時其道轉淨勝見苦時問曰欲界見苦邊等智色界見苦邊等智何者為勝答曰色界者勝所以者何以色界法勝於欲界法故欲界繫見集邊等智色界繫見苦邊等智何者為勝答曰欲界者以在勝身中修故勝色界者以界勝故勝問曰見苦邊欲界等智見集邊色界等智此二何者為勝答曰色界者以二事故勝一以界勝二以在勝身中故勝如以苦問集以苦問滅以集問滅當知亦如是問曰何故法智邊不修此智耶答曰以非田非器故乃至廣説復有説者此智以見道後邊得故名見道邊智若當法智邊亦修者此智當言見道中智復有説者此智能摧伏出過有頂然後得之如苦比智現在前此智便修是時名摧伏出過見苦所斷法見集見滅説亦如是復有説者所作已竟不作方便時得此等智如苦法智現在前此智則修是時名於苦已竟不作方便集比智滅比智説亦如是法智當多有所作雖知欲界苦未知色無色界苦雖斷欲界諸行集證欲界諸行滅未斷色無色界諸行集未證色無色界諸行滅復有説者若苦比智現在前時此智修見苦所斷愛畢竟滅集比智現在前時此智修見集所斷愛畢竟滅滅比智現在前時此智修見滅所斷愛畢竟滅法智分時見苦集滅所斷愛不畢竟滅是以不修問曰道比智邊何以不修此智耶答曰或有説者非其田器故乃至廣説復有説者此智是見道眷屬隨從見道邊比智是修道故復有説者見道邊等智依堅信堅法身道比智依信解脫見到身復有説者見道邊等智是向道所得道比智是果道所得復有説者所作已竟不作方便是時此智修道比智當多有所作為作何等謂當得未曾得道捨曾得道所斷結使同一味一時得八智修十六行復有説者此智見道邊得故言是見道邊等智若諦有邊名者是處便修三諦有邊名非道諦如説此身苦邊此身集邊此身滅邊不説此身道邊問曰因論生論何故佛經不説道邊耶答曰有能盡知苦盡斷集盡證滅無有能盡修道者佛於道盡得修不能盡得行修復有説者若諦以世間道出世間道能見者説邊無有以世間道見道諦者如世間道出世間道有味無味有愛出要繫不繫當知亦如是復有説者前無有際無始以來或曾以世俗道見於三諦彼世俗道亦言我是道後若以真實道見道諦時世俗道慚羞捨去如村落中未立主時自貴者多後若立主諸自貴者慚羞捨去彼亦如是復有説者見道邊等智體是有苦諦是有是有果説名為邊苦集諦是有是有果滅諦雖非有是有果道諦非有有亦非有果故復有説者三諦有無量過患無量功德苦集諦是無量過患滅諦是無量功德道諦亦無無量過患亦無無量功德故復有説者凡夫於無始生死已來於三諦曾已有功後若得正決定時皆見道邊等智亦欲證此法猶如與欲法我亦當知苦乃至證滅然無有凡人曾修聖道者復有説者見苦時不見真道見集滅時亦不見真道見道諦時乃見真道時世俗道言我非道是中應説烏孔雀等喻復有説者見道諦時斷緣道諦道使非三諦是故世俗道於三諦自言是道後見道諦而便退還是故不修界者在欲色界問曰何故無色界中無耶答曰非其田器故乃至廣説復有説者若地有見道則有見道邊等智無色界無見道故無如是因論生論何故無色界無見道耶答曰非其田故乃至廣説復次若有緣一切法無我行是中則有見道無色中無緣一切法無我行故無見道復次若地有達分善根則有見道無色界無達分善根故無見道復次若地有忍有智復次若地有法智分比智分復次見道法決定應爾若依下地得正決定則上地不修無色中若有見道邊等智者依第四禪入見諦道彼則無用故不修地者七地中有謂欲界未至中間根本四禪若依未至禪得正決定彼一地見道修二地見道邊等智修若依初禪得正決定二地見道修三地見道邊等智修若依中間禪得正決定三地見道修四地見道邊等智修若依二禪得正決定四地見道修五地見道邊等智修若依三禪得正決定五地見道修六地見道邊等智修若依四禪得正決定六地見道修七地見道邊等智修依者依欲界身或有説者依色界身所以者何如來展轉曾有色界身亦能作所依故辟支佛聲聞亦如是報者後當廣説行者行十二行苦邊者行苦四行集邊者行集四行滅邊者行滅四行緣者欲界緣欲界苦色界緣色無色界苦緣集滅説亦如是復有説者此是總緣如緣欲界苦者緣色界苦者此總緣苦諦乃至滅諦説亦如是評曰此是別緣非總緣如前説者好念處者苦集邊是四念處滅邊是法念處智者是等智定者不與定俱根者總而言之與三根相應謂喜樂捨根三世者是未來世緣三世者若苦集邊者緣於三世滅邊者不緣世善不善無記者是善緣善不善無記者緣欲界苦集者緣三種色界苦集邊者緣善無記滅邊者唯緣善三界繫者是欲色界繫緣三界者欲界苦集者緣欲界繫色界苦集邊者緣色無色界繫滅邊者緣見不繫是學無學非學非無學者是非學非無學緣學無學非學非無學者是緣非學非無學見道斷修道斷不斷者是修道斷緣見道修道不斷者若苦集邊者緣見道修道斷若滅邊者緣不斷緣名緣義者若苦集邊者是緣名緣義若滅邊者是緣義緣自身他身不緣身者若苦集邊者緣自身他身若滅邊者不緣身問曰此智為依凡夫身為依聖人身耶若依凡夫身者何以不名凡夫法若依聖人身者此法終不起現在前若起者云何不二道俱現在前或有説者應作此論不依凡夫身亦不依聖人身評曰不應作是説云何名善根不依凡夫身不依聖人身實義者當言依聖人身問曰聖人不起現在前何以言依聖人身耶答曰雖不起現在前以時而言應在聖人身復有説者依堅信堅法身彼堅信堅法人不起所期心故不現在前問曰如堅信堅法身雖智忍所依云何復是此智所依耶答曰彼有二種身一種得見道亦在身中成就亦現在前即此身得此智不在身中成就不現在前第二身得等智在身中成就亦現在前即此身得見道不在身中成就不現在前若此身得見道在身中成就現在前得是智不在身中成就不現在前如此身堅信堅法起現在前若此身得是智在身中成就現在前得見道不在身中成就不現在前若起期心堅信堅法亦能起此身現在前是聞思修慧者欲界者是思慧以勝故非是聞慧以欲界非離欲地非定地非修地故非修慧若欲修時墮思慧中若色界是修慧非聞思慧所以者何以勝故非聞以色界是離欲地定地修地故非思慧若欲思時墮修慧中為在意識五識者在意地非五識身問曰得須陀洹果捨見道亦捨見道邊等智不耶答曰不捨所以者何捨無漏時異捨有漏時異無漏法以三時捨謂退時得果時轉根時有漏法亦三時捨謂退時離地離界時善根斷時彼時非退不離地界不斷善根故不捨復次修道與見道二事相妨一不得俱成就二不俱現在前修道與見道邊等智一事相妨不俱現在前得俱成就問曰若不捨者於修道中起現在前不耶答曰不起現在前以是事故先作是説修道於見道邊等智一事相妨成就不現在前以不妨成就故不捨妨現在前行故不現在前復次以是見道眷屬不離見道故修道中不現在前復次以依堅信堅法身故依餘身不起現在前復次以不離向道故不依餘身現在前問曰此為有報無耶答曰有報問曰此報為在何處答曰若欲界者報在欲界若色界者報在色界若在初禪報在初禪乃至若在四禪報在四禪問曰如聲聞可爾所以者何聲聞當在色界身故佛辟支佛云何可爾答曰彼亦有展轉凡夫時身在色界受報問曰若然者云何聖人身作因凡夫身受報耶答曰若然者有何過有聖人身作因凡夫身受報如惡道有二種因一見道所斷二是修道所斷六種煩惱如此聖人身作因凡夫身應受報無過彼亦如是復有説者佛辟支佛亦有聲聞陰界入展轉色界身分而受此報評曰不應作是説如是説者好以是有漏善根故言有報而此報不熟未曾有受之者得盡智時三界善根未來修問曰為修幾耶答曰若生欲界得阿羅漢則三界善根未來世修若生初禪則八地修乃至若生非想非非想處則一地修問曰此善根為是生得為是方便耶答曰是方便非生得為是聞思修慧者若欲界者是聞思慧若色界是聞修慧若無色界是修慧問曰如欲界是聞思慧色界是聞修慧聞思慧羸劣云何未來世修耶答曰以他力故未來世修非自力為是意地是六識身是意地非五識身所以者何方便善在意地生得善在五識問曰若唯在意地者此説云何通如説漏盡阿羅漢成就六識支幾過去成就幾未來成就幾現在成就為有耶為無耶若有者誰有耶云何有耶答曰有若阿羅漢初起善眼識現在前一支過去六支未來一支現在彼滅已不捨若善耳識現在前二過去六未來一現在彼滅已不捨乃至善意識現在前六過去未來一現在此云何通答曰此中所説者最初得阿羅漢清淨身所得善根不取無始生死已來者復有説者此説阿羅漢六常住法問曰阿羅漢六常住法體性是何答曰或有説者體性是念慧何以知之答曰依佛經故佛經中説阿羅漢若眼見色以念慧力住於捨心不生憂喜乃至意知法廣説亦爾復有説者若取回轉相應共有體是四陰五陰此是六常住體性乃至廣説已説體性所以今當説何故名常住云何常住義答曰阿羅漢常住此法未曾遠離故名常住問曰一切阿羅漢盡有此常住法不答曰或有説者不盡有若阿羅漢是非時解脫得種智者此有常住法評曰應作是説一切阿羅漢盡有所以者何一切阿羅漢常有念慧故界者是欲界色界地者五地謂欲界四禪問曰以何等故得阿羅漢果三界善根未來世修非餘時耶答曰阿羅漢必須世俗出定入定心復次當於爾時不滿解脫得滿足故學人解脫乃至金剛喻定不名滿足若得盡智乃名滿足猶如農夫灌田一畦滿已復流一畦若諸畦已滿更不復流彼亦如是復有説者是時心得自在首繫解脫羂是時所修善根如貢上法猶如國王登位首繫羂時一切萬姓貢上珍寶彼亦如是復次是時能折伏未曾折伏煩惱力士諸善根皆稱善故修猶如大衆集會一處若能撲未曾有力士者大衆稱慶彼亦如是復有説者是時能破未曾破煩惱怨家諸善根如迎法故修猶如有人能破怨家歸國之時多人出迎彼亦如是復有説者無有前際無始已來諸善根身常為煩惱身所覆蔽沈沒不能自免欲界煩惱盡時不得止息乃至非想非非想處八種煩惱斷時猶不得止息若九種煩惱盡時是時乃得止息如束絹法九處約之若斷一約乃至八約其束不散若九約都斷然後乃散彼亦如是時解脫阿羅漢是時二種慧修謂盡智無學正見盡智行十四行無學正見行十六行若依未至禪三十法智修三十比智修乃至第四禪亦如是若依空處三十比智修非法智乃至無所有處亦如是非時解脫阿羅漢是時三種慧修謂盡智無生智無學正見盡智無生智有十四行無學正見有十六行若依未至禪有四十四法智修四十四比智修乃至第四禪亦如是若依空處有四十四比智分修非法智乃至無所有處亦如是諸心過去一切彼心變易耶乃至廣説問曰何故作此論答曰為止於世中愚言無過去未來現在世是無為法為止如是意欲明過去未來是有法故而作此論諸心過去一切彼心變易耶心變易有二種一隨世變易二法變易過去染污心有二種變易一隨世變易二法變易不染污心唯一種變易謂隨世變易非法也未來現在染污心是法變易非隨世也不染污心非法變易亦非隨世變易諸心過去一切彼心變易耶答曰諸心過去一切彼心變易若為染污者有二種變易不染污者有一種變易謂隨世變易頗心變易彼心非過去耶答曰有未來現在欲恚相應心為明此義引佛經為證如説佛告比丘若伺賊以鋸截汝支節是時心變易口不應惡言若心變易口出惡言是汝留難以是義故恚相應心是名變易如説若比丘淫欲變心以是義故欲相應心是名變易問曰一切染污心盡是變易何以唯説欲恚相應心是變易不説餘使相應心耶答曰或有説者此説有餘乃至廣説復有説者應説餘使相應心而不説者當知此義有餘復有説者若正是佛經所説此中則説此二心正是佛經所説是故説之如是因論生論何故世尊説欲恚相應心是變易不説餘使相應心耶答曰以欲能變身恚能變境界所以者何若於境界生愛所有心心數法馳騁緣中是時此身猶無情物若於境界生恚猶不能以面向之何況正視復有説者此二能變身能變生處欲心能變身者或有衆生起貪欲纏能變男形使滅女形使生或有衆生起瞋恚纏能使人身滅使成蛇身此中應説外道來作比丘喻曾聞有尼揵子來詣佛法出家時諸比丘在其人前説惡法中種種過患其人聞已於佛法生大瞋恚以瞋恚故人身即滅便成蛇身云何欲心能變生處如世尊説告諸比丘有遊戲失念天彼天若快意遊戲受樂之時身體疲惓心則失念以失念故於彼命終云何恚變生處世尊亦説有恚害意天彼諸天心懷恚時以惡眼相視惡眼相視故恚心轉盛恚心轉盛故於彼命終瞋恚復能變生處如以恚心打他他人即死復有説者欲能變時恚能變形欲變時者以欲故有嬰孩少壯男女等時差別恚變形者以恚故鋸截他手足耳鼻種種身分以此二法能壞時壞形故是以説之復有説者以此二法能生憎愛種種過患故是以説之復有説者此二法速能令身色變異是以説之若心有染一切彼心變易耶乃至廣説問曰何故作此論答曰先説淫欲心變易或謂唯淫欲心是變易非餘今説三界欲心盡是變易故而作此論若心有染一切彼心變易耶答曰若心有染一切彼心變易若過去心有二種變易若未來現在有一種變易謂法變易頗有心變易彼心非有染耶答曰有過去欲不相應心若染污有二種變易不染污一種謂隨世變易未來現在恚相應心如説伺賊以鋸截汝身體乃至廣説如是心是法變易非有染問曰現在心至過去名變易未來心至現在何以不名變易耶答曰若變易心更不變易故名變易未來心至現在復當變易至過去故不名變易復有説者若所作變易隨世變易是名變易現在心雖有隨世變易無所作變易所以者何猶有所作復當變易至過去世故問曰何故名伺賊耶答曰晝伺其便夜則偷劫問曰何故以鋸為喻耶答曰以刀截人有入時痛出時不痛有出時痛入時不痛以鋸截人出入俱痛是以為喻若心有恚一切彼心變易耶答曰若心有恚一切彼心變易如前所説盡應説之頗變易一切彼心非有恚耶答曰有過去恚不相應心未來現在欲相應心如是一切煩惱相應心隨相應説
