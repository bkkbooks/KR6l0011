body:
  text: 迦旃延子造五百羅漢釋北涼天竺沙門浮陀跋摩共道泰等譯雜犍度世第一品之四此二十種身見幾是我見幾是我所見乃至廣説問曰何故作此論答曰世尊經中處處説二十種身見而不廣分別唯尊者舍利弗經中一處分別彼雖分別而不説此二十種身見幾是我見幾是我所見因彼諸經不分別故今欲分別故作此論復次毗婆闍婆提作是説身見無所緣如身見緣我實義中無我彼何所緣如人見繩謂是蛇見杌謂是人為止彼人如是意故亦欲顯身見有所緣故身見緣五陰但所見事異非無所緣如彼人喻見繩謂是蛇見杌謂是人此亦所見事異非無所緣是故止異人意欲顯己義亦欲示決定法相故而作此論問曰此二十種身見幾是我見幾是我所見答曰五種是我見十五種是我所見問曰若我見有五我所見亦應有五何故説十五我所見耶答曰緣行故説五我見具故説十五我所見所以者何此十五我所見以具故生應説一我見所謂五見中我見應説二如我見我所見應説三謂欲界色無色界我見應説六如欲界中有我見我所見色無色界亦爾應説九如欲界地我見乃至非想非非想地我見應説十八如欲界地我見我所見乃至非想非非想地我見我所見如分別行緣陰應説二十不分別所起處見色是我色異我色屬我我在色中如色四種受想行識亦如是如是五四則有二十以行緣分別十二入則有四十八不分別所起處如見眼入是我眼入異我眼入屬我我在眼入中如眼入有四乃至法入亦有四如是十二四則有四十八以行緣分別界則有七十二不分別所起處如眼界是我眼界異我眼界屬我我在眼界中如眼界有四乃至法界亦有四如是十八四則有七十二若分別緣陰分別所起處則有六十五如説色是我受是我瓔珞受是我僮僕受是我器如受有三想行識亦三如是四三有十二及色有十三如是五種十三則有六十五若分別緣入分別所起處則有四百八眼入是我色入是我瓔珞是我僮僕是我器如眼入有三十四乃至法入亦有三十四十二種三十四則有四百八若分別緣界分別所起處則有九百三十六眼界是我色界是我瓔珞是我僮僕是我器如眼界有五十二乃至法界有五十二十八種五十二則有九百三十六如是種種身諸剎那相續則有無量我見我所見此處分別行緣陰不分別所起處則有二十問曰以何等故此身見言種答曰此二十種身見各有差別故言種問曰以何等故因陰説二十我見非因界入答曰或有説者彼作經者有如是意如是欲如是可隨彼意作經不違法相復有説者為現初起初方便入法如因陰説見因界入亦應如是説而不説者當知此義是有餘之説復有説者此陰説見者正佛經所説佛經因陰説二十種我見彼作經者亦依佛經作論説二十種我見問曰置作經者以何等故世尊因陰説二十種我見答曰為化衆生故佛因陰説二十種我見若受化者應聞界入而得度者世尊亦因界入説於我見以不應聞是故不説復有説者諸見生時多依於陰少依界入是故世尊因陰説見不因界入色是我者云何為色諸所有色盡四大四大所造定諸所有有二種有盡諸所有有不盡諸所有言不盡者如求糟粳等少物有亦名諸所有言盡者如求一切物及糟粳等亦諸所有此中唯説盡諸所有色問曰如我見是自界緣非他界緣彼云何能見一切色是我答曰諸是彼所行是彼境界者計以為我非一切色也色異我者云何色異我於此四陰展轉計異於我彼作是念此色是我有如人有財名為有財色屬我者云何色屬我於此四陰展轉計屬我如人有僮僕言僮僕屬我色中我者云何色中我於此四陰展轉計是色中我彼作是念色是我器如油在麻中膩在揣中如蘇在酪中如刀在鞘中蛇在篋中如血在身中問曰如受是我色是具可爾色麁受細故如説色是我受是具云何見麁色入細受中尊者波奢説曰不應責盲人墮坑亦不應問無明者愚復有説者彼見色是我受是具者彼人見受麁色細是以見色住於受中尊者和須蜜説曰此四大身中盡能覺觸有所觸處則能生受以受處處生故言色裹在受中尊者佛陀提婆説曰彼見受遍在身中從足至頭無不有受處然計色是我不遍在身是故彼見色住在受中問曰以何等故我見説二十種其餘諸見不説耶答曰或有説者彼作經者意欲爾乃至廣説復有説者此為現初起初方便初入法如説身見有二十種戒取應有四十種邪見見取應各有八十種應説而不説者此義是有餘之説復有説者為對治我見故佛説十種空十種空者所謂內空外空內外空有為空無為空第一義空無所行空無始空性空空空此十種空與何法相對與我見相對以空與我見相對故有二十種我見餘見不爾是故不説問曰頗於一陰起我見我所見耶答曰起如於眼入起我見其餘諸色起我所見餘四陰亦如是問曰頗有我見者一時於五陰盡計我不耶若有者朔迦書云何通如説唯有一我見無有五我見無五我見者無計五陰是我者是也所以者何計我見唯計一法五陰是別異法計我見家説一我一人無分不壞不變是常若無者薩遮尼乾子經云何通如説瞿曇沙門色是我受想行識是我答曰無有一時計五陰是我者問曰若然者薩遮尼乾子經云何通耶答曰彼自大心重故作如是説復有説者彼不信佛內有知見欲試如來彼為知不故作不順理説次見如來諸論議相頷如師子鉤牙銛利口四十齒出梵音聲彼人聞已心懷怖懅作不順理説復有説者彼人見如來威德勝於梵釋難近難親有如是威德故作不順理説復有説者天神威逼故令彼人作不順理説復有信佛天神作如是念此弊惡人何以久惱如來故以威逼能令彼人作不順理説復有説者或有一時計五陰為我問曰若然者朔迦書所説云何通答曰彼人於此五陰盡作一具聚相問曰若然者復以何為具答曰若計內入為我則以外入為具若計外入為我則以內入為具問曰為有見微塵計以為我不若有者是則無我見非是我見若無者朔迦書復云何通如説五大微塵雖各異相是我是常若言無常是則無理問曰彼書云何通我見見微塵答曰此書説邊見緣微塵此義已立當知我見緣微塵此義亦立答曰無有見微塵計以為我問曰若然者朔迦書復云何通答曰此書所説不順正法理復有説者有見微塵計以為我有推理見義無實見生時義評曰不應作是説如前説者好問曰五陰之外為有起我見者不若有者此經云何通如説若有沙門婆羅門起於我見盡見五受陰若無者説第六我見復云何有答曰無有五陰之外起於我見問曰若然者第六我見云何而有答曰思是行陰於思起我見其餘行陰起於我所見即是第六我見佛經説身見是六十二見根本餘經復説若有沙門婆羅門所起諸見盡依二邊若斷若常此二經有何差別答曰云何能生諸見故説身見為本守護長養諸見故是説邊見復有説者能生諸見是説身見為根本使諸見轉行是説邊見復有經説若入地一切處定行者作是念地即是我我即是地不離不異餘一切處亦如是問曰諸得一切處定必離第三禪欲彼若見地是我當知是第四禪地身見見第四禪中地為我一切處定法緣欲界彼云何不相違耶答曰此中不定説定如非沙門説名沙門復有説者以本名説故如王失位猶名為王行者本曾得此定後雖失時猶稱得定復有説者行者於定速疾故失於彼定起欲界身見捨於身見還得彼定如提婆達多於定速疾以神足力自化己身作太子像於阿闍世王抱上回轉遊戲復現相貌令阿闍世王知是尊者提婆達多當作太子像時阿闍世王抱弄嗚之唾其口中貪利養故即便咽之是以世尊而語之言汝是死尸食唾之人若咽唾時彼非離欲若作太子為阿闍世王所抱弄時爾時離欲復有説者身見見第四禪中地是我一切處定亦緣第四禪中地問曰若然者一切處定不緣欲界耶答曰一切處定亦緣欲界亦緣第四禪問曰如色界諸天一切悉白彼復云何見青黃赤等差別答曰彼衆生數者其色悉白非衆生數有青黃赤色評曰不應作是説所以者何若我見與一切處定是相應共有法者應有是過云何是一切相應共有法少緣欲界少緣色界身見與一切處定雖非相應共有法而一人亦得二名以計我故名為身見以得定故名得定人身見緣第四禪中地一切處定緣於欲界不同一時是故此論為已善通無常見常乃至廣説問曰何以作此論答曰此諸邪見於生死中為諸衆生作大繫縛作大衰患作大藏伏猶如世間繫縛衰患藏伏人若不見不能遠避人若見時則能遠避此諸邪見乃至廣説亦復如是此中應以二事推求邪見一以體性二以對治如智犍度見犍度如增益智論彼中亦以二事推求邪見一體性二對治如增益智論中説沙門瞿曇汝是幻世尊之道已過於幻此邪見謗道是其體性見道斷是其對治復作是説此是阿羅漢汝何故慳惜阿羅漢名也世尊之道已過於慳此邪見謗道是其體性見道斷是其對治如偈問論如梵網經説應以起處推求邪見便有三事所謂起處體性對治復有説者不應推求邪見三事所謂起處體性對治若推求邪見如責無明汝何以愚復有説者應以三事推求邪見所謂起處體性對治若能以三事推求邪見雖是具縛凡夫邪見過患不現在前猶如聖人以無漏道斷諸邪見永不復起如陀婆法師昔在罽賓與衆多修行比丘共會一處論説諸見有作是言者諸大德聖人能斷多諸過患邪見惡行永不現前甚為希有爾時陀婆法師在此會中而作是言聖人以無漏道斷諸邪見永不現前有何奇事如我今者住凡夫地以此二事推求邪見若久住生死者無有是處設久住生死更不現前以是緣故應以三事推求邪見無常有常見者云何無常答曰一切有為法問曰彼諸外道為以何事言常耶答曰見色相似相續諸心法憶本所作能誦持諸論云何見色相似相續如昨日所見色今日相似彼作是念童幼時色即老時色云何心法憶本所作如昨日所作今日故憶如是諸先所作後時皆憶能誦持經論者如少所讀至老能誦彼作是念今日誦心即往日讀心彼以是故計常無常計常是邊見邊見有二種有斷有常是則説邊見體性見苦斷是其對治此見緣苦而生故見苦斷如草上露日照則乾彼亦如是若見苦時彼見則斷復有説者苦法忍苦法智是其對治苦法忍苦法智生時斷此虛妄分別顛倒嶮惡斷見問曰如善説法中亦説諸法有自體性相常住而不是邪見何故惡説法中若説此相便是邪見答曰或有説者善説法雖説有自體性相常住無所作惡説法中於一切時常有所作復有説者善説法中説法性不數數作惡説法中説於法性則數數作復有説者善説法中説於法性為生所生為老所老為無常所壞惡説法中不為生所生乃至廣説復有説者善説法中説法性屬諸因緣彼所説法不屬因緣復有説者善説法所説則與生滅相應彼則不爾復有説者善説法中説法則從因生能有所作屬於衆緣以是諸因緣故善説法雖説體性常住不墮邪見惡説法者墮於邪見問曰邊見是何義答曰取於斷邊取於常邊是邊見義如經説佛告迦旃延若以正智觀世是集言無所有則更不行無所有者即斷見也見此有滅未來身生而作是念是衆生死此生彼非是斷耶又迦旃延若以正智觀世是滅言世有所有則更不行言世有所有者則是常見知此陰界諸入展轉相續彼作是念此諸法等有生有滅非是常也復次起我見者猶是邊僻下賤世所呵責況復於我計有斷常復有説者此見行邊處故有二種義名行邊處一行常邊二行斷邊以是等義故名邊見問曰實義常者是滅盡涅槃云何無常見常不名邪見答曰諸言無所有是名邪見此則不言無所有更增益所有是故非邪見常見無常者云何為常答曰滅盡涅槃問曰彼諸外道為以何事言涅槃無常答曰彼以四無色定為解脫涅槃一名無身二名無邊意三名淨聚四名世塔無身者是空處定無邊意是識處定淨聚是無所有處定世塔是非想非非想處定彼作是説如此涅槃雖久當還當知釋種所説涅槃亦當復還是以故言涅槃無常彼常見無常者此是邪見是其自性見滅所斷是其對治此見因滅生故故見滅斷如草上露乃至廣説問曰為有邪見能觀是無常行不若有者波伽羅那經云何通如説云何邪見使使答曰諸謗無因無作是名邪見使此中何以不説若無者此文復云何通如説常見無常此是邪見見滅所斷答曰有此邪見常見無常問曰若然者波伽羅那經何以不説耶答曰彼説邪見行相不盡自有諸結行相彼中不盡説復有説者雖有此見悉入彼所説中如謗言無因當知謗集如謗言無作當知謗於三諦復有説者謗言無因是説謗於三諦謗言無作是説謗於滅諦復有説者無有邪見能謗常言無常問曰若然者此文復云何通答曰涅槃有常相若言無涅槃亦謗常相猶如有人謗人無指亦謗指所依色香味觸彼亦如是復有説者彼外道言五陰是常釋種言涅槃是常非陰彼作是説除陰之外更無有常以是義故豈非謗涅槃耶苦作樂見者乃至廣説云何為苦五受陰是實苦彼諸外道以何等故言苦是樂答曰以少時樂故言樂如人極時止息為樂熱時涼為樂寒時暖為樂飢渴時得飲食為樂以是事故言陰是樂如説以下法為最名曰見取是其自性見苦斷是其對治問曰苦有樂見名曰見取以何等故無常見常不名見取答曰彼無常常見者勝不勝法同為一體自有法雖言常不勝如計虛空非數緣滅苦有樂見以下法為最名為見取無常見常不名見取復有説者陰中有大苦故以小苦為樂以此小樂同於涅槃故名見取無常見常陰中無有少常同於常者所以者何一剎那頃更無停住是散滅法如説云何滅時法答曰現在法以是事故無常見常是名邊見不名見取樂有苦見者乃至廣説云何為樂實義樂者滅盡涅槃彼諸外道以何等故以涅槃為苦答曰如人壞一根時便以為苦彼作是念若壞一根猶以為苦況衆多根以是事故以樂法為苦尊者和須蜜説曰若一根在猶為苦因況多根在不為苦因若諸根滅則為解脫涅槃樂有苦見邪見是其體性見滅斷是其對治此見依滅生還見滅斷如草上露乃至廣説問曰以何等故見涅槃是苦名為邪見非見道諦耶如説道諦亦是樂能至樂故答曰道有二分苦分樂分以道能至樂處故名為樂分無常故苦名為苦分涅槃無二分純樂謗者即是邪見道諦不爾復有説者如見犍度所説有二種樂一名數樂二實義樂上言能至樂處者是名數樂非實義樂復次以涅槃樂故道得稱樂問曰為有邪見能緣涅槃是苦不耶若有者波伽羅那經云何通如説云何邪見使使答曰諸謗無因無作乃至廣説應如上常計無常句中説不淨見淨者云何不淨答曰一切有漏法有二事故不淨一以煩惱二以境界彼諸外道以何事故不淨見淨答曰愚於所行以少時淨故如治爪齒髮膚形容摩身洗浴等以是事故彼見是淨若此法中有少淨性者彼計則非邪見以顛倒想故計屎尿腸胃等是淨故名為見取復應以二事知有漏行是不淨法一從煩惱生二從淫欲生如説以下法為最此名見取是其自性見苦所斷是其對治乃至廣説問曰現見屎尿涕唾流出彼云何言淨答曰彼作是説所流出者雖是不淨彼流出處是淨猶如緊首迦樹花其色似肉花盛之時野干見之便作是念如我今者定當食肉久住樹下或時樹花有墮地者即便嗅之乃知非肉復作是念墮者雖非是肉樹上餘者必應是肉彼諸外道亦復如是所流出者雖非是淨所流出處必應是淨問曰如善説法中亦説有漏善行是淨而非邪見彼説即是邪見答曰有少淨相便見少淨問曰何等是淨相答曰不雜煩惱復與煩惱相違是故非是邪見彼惡説法中以不淨法同於實義清淨之法是名邪見復有説者如善説法中以善行為淨故非邪見彼以善不善行不善根煩惱顛倒邪見是淨故名邪見問曰如有漏法雜煩惱故當知不淨云何説言三淨答曰如實義一切有漏法盡是不淨以假名故説淨云何假名從無貪無恚無癡善根生故亦能對治貪欲等法故名假名淨見不淨者此見有二種乃至廣説云何為淨答曰道道果彼諸外道以何事故言滅道不淨答曰彼作是説如實義諸煩惱是不淨法道能斷之以道能斷諸煩惱故道亦不淨以涅槃從不淨道生故亦是不淨猶如以刀割不淨物刀則不淨以不淨刀更割餘物能令餘物不淨又如水洗不淨物水則不淨若以此水更洗餘物物則不淨如是以道斷諸煩惱道則不淨若以此道生於涅槃亦是不淨言道是不淨此見名邪見是其自性見道斷是其對治若言滅是不淨此見名邪見是其自性見滅斷是其對治見道斷邪見緣道生故若道智道忍生時斷見滅斷邪見亦如是無我見我者乃至廣説云何無我答曰一切諸法無我彼諸外道以何事故見我答曰愚於來去威儀法故彼作是説若無我者誰來誰去誰住誰坐誰屈誰申耶以有我故能來去住坐屈申復次若無我者則無見聞嗅香知味覺觸憶念以有此事必知有我彼無我見我此名身見是其自性見苦所斷是其對治此見緣苦生乃至廣説我有二種一假名我二計人我若計假名我則非邪見若計人我此則邪見問曰此中但説我見何以不説我所見答曰我見是顛倒性我所見非顛倒性復有説者我見是根本若説我見當知亦説我所見復有説者以有我見得有我所見若説我見當知亦説我所見己見己所見亦如是問曰以何等故不説我見無我名為邪見答曰以無我故復有説者若我見無我是則正見不名邪見非因見因乃至廣説問曰彼云何非因見因答曰謬見因故如農夫種殖秋大獲實彼作是言此皆尸利夜天思陀夜天舍摩夜天恩之所與若生男女彼作是言此皆難陀天難陀婆羅天之所與若富貴者生男女彼作是言此皆是毗紐天摩醯首羅天之所與彼作如是謬見於因非因計因此名戒取是其自性見苦所斷是其對治此戒取緣苦生故還見苦斷問曰無因見因是亦名謗因云何非邪見答曰尊者和須蜜説若謗無因是名邪見彼不言無因非因計因故非邪見有因無因見乃至廣説彼諸外道以何事故言無因耶答曰見內外所有諸物有種種相故彼作是言誰鑿河誰積山誰纖刺誰采畫禽獸故説是偈誰能造刺纖采畫諸禽獸此皆無因作世無自在者彼有因無因見此名邪見是其自性見集所斷是其對治此見緣集生還見集斷乃至廣説問曰以何等故此中説謗因邪見見集所斷見犍度中説謗因邪見當言見集見道斷答曰或有説者彼作經者意欲爾乃至廣説復有説者此中不説一切因義彼説一切因義復有説者此中謗生果因彼中説者謗生果不生果因若説涅槃無因此豈非正見耶復有説者此中説謗苦因彼中説謗苦不苦因復有説者此中無謗道因義是故不説是謗道邪見唯有謗集因義是以説是謗集邪見有作無見乃至廣説云何為有答曰四諦是也彼諸外道以何事故言無諦耶答曰以有我見故言無諦彼作是説我無有苦是則謗苦我無有因是則謗集我若無滅是則謗滅若無有滅則無對治如善法中作如是言此陰是苦無我生信苦心言有苦諦此苦有因生信集心言有集諦若苦有滅生信滅心言有滅諦滅若有對治生信道心言有道諦彼有作無見此名邪見是其自性見苦集滅道所斷是其對治此見緣四諦生還見四諦斷乃至廣説問曰以何等故邪見不緣虛空非數緣滅答曰或有説者若法是陰是陰因是陰滅是陰對治邪見則緣虛空非數緣滅非陰因滅對治是以邪見不緣復有説者若法是苦是苦因是苦滅是苦對治邪見則緣虛空非數緣滅與上相違是故邪見不緣復有説者若法是煩惱是出要邪見則緣虛空非數緣滅與上相違是故不緣復有説者若法為無漏正見所緣亦為邪見所緣虛空非數緣滅不為正見所緣邪見亦不緣如邪見正見明非明智非智決定疑信誹謗當知亦如是問曰若言無虛空非數緣滅此心為何所緣答曰即緣虛空非數緣滅名所以者何此無深重心如謗煩惱出要法問曰為是何智答曰此是思惟所斷不隱沒無記邪智有作無見者有有三種一相待有二處所有三實有相待有者因有故有無因無故有有處所有者如此處有彼處無實有者此實有此實無如苦實有我實無復有説者有有二種一物體有二施設有物體有者謂五陰施設有者謂男女等謗苦有二種一謗物體二謗果若謗集者謗物體謗因若謗滅者謗物體不謗果若謗道者謗物體不謗因或有説者亦謗因無作有見乃至廣説問曰何以作此論答曰或有説者應作是説若無作有見當言是身見見苦所斷復有説者應作是説無作有慧所以者何此非見性復有説者應作是説此非是見所以者何五見不説故而不説者彼有何意答曰欲作問答故如説無作有見此是何見是名為問答曰此非是見是名為答自有雖無是事而有問答如十門中未知欲知根知根知已根無漏無為法亦問幾使所使此亦是問答曰不為使所使此亦是答如彼雖無是事而有問答此亦如是無有是事而作問答無作有見此是何見答曰此非是見是邪智問曰云何邪智答曰或有説者是思惟所斷不隱沒無記法如行正路作非路想如行非路作正路想如男作女想女作男想如是等想是也復有説者此智亦有隱沒無記所謂與慢相應者如彼梵天作如是説我是大梵諸梵中尊我能造化此是邪智所以者何無有住見諦所斷心能作是言者應作是説如前説者好是思惟所斷不隱沒無記法問曰若然者違智揵度如説云何邪智謂染污慧答曰不與彼相違所以者何無知有二種所謂實義假名實義者與無明使相應是諸阿羅漢已斷盡假名者如見杌謂是人等者阿羅漢辟支佛亦有唯有如來等正覺二事俱盡有四倒所謂常樂淨我為相似法所覆故不知無常為適意威儀法所覆故不知苦為皮膚所覆故不知不淨為所作事覆故不知無我問曰此四倒性是何答曰是慧性問曰若是慧者此五見幾是倒幾非倒答曰二見半是倒二見半非倒二見半是倒者身見見取及邊見所攝常見二見半非倒者邪見戒取及邊見所攝斷見問曰以何等故二見半是倒二見半非耶答曰以三事故名倒一轉行二增益三性倒邪見斷見雖轉行性倒而非增益所以者何是壞物性故戒取雖轉行雖增益性非是倒所以者何有少相似法故亦説有色界道能離欲界欲有無色界道能離色界欲此是倒自體是我是物是相是分是性已説自體所以今當説以何等故名為倒答曰倒有所增故名倒此四倒唯見苦斷所以者何緣苦生故還見苦斷復次此倒緣果生還以見果慧斷復次身見見苦所斷性是倒若身見斷亦斷復次苦麁若於麁苦有錯謬者賢聖所呵如人晝日錯謬人之所呵三諦微細若於微細有錯謬者不深呵責如於夜中有脫失者則世人不深呵責復次行者已見苦永無倒心若當行者見苦已不見集者無有是處為分別故設見苦已更不見餘諦若問彼言此陰為是常為是無常彼定答言是無常乃至無一剎那停住者若問為是苦為是樂彼定答言是苦猶熱鐵丸若問為淨為不淨彼定答言是不淨猶如糞聚若問為有我無我耶彼定答言無我以無作者無彼作者無受者故如草木糞掃等
