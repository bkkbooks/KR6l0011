  - {type: variant, offset: 7940, length: 509, content: 問曰：以何等故世尊說緣世生疑是冥身，不說緣無為是冥身耶？答曰：或有說者，世是麁法，現可了知。若於世脫失，諸聖說是冥身；無為法微細，不可現得了知，是故諸聖不說是冥身。如人晝行脫失，為世人所呵笑；如人夜行脫失，則不為世＋（人）【三】【宮】世【大】，世人【宋】【元】【明】【宮】世世人所呵笑。彼亦如是。復有說者，為諸外道故，緣世生疑，說是冥身。諸外道偏愚於世，我曾在過去世不，乃至廣說；是故說疑世是冥身。復有說者，疑心多緣世生、少緣無為生。復有說者，世乃至小兒猶於中愚，所謂去來今事。以如是等現事故，世尊說疑世心是冥身。涅槃是非根法，甚深微細覺性乃能了知，是故疑此法者不說冥身。如經說：佛告比丘：以五事故令心弊惡。云何為五？所謂有人於如來所而生疑心，不解、不觀、不信，是名於如來所不斷心弊惡；於法、於戒、於教亦如是。佛所讚歎、智人所識、修梵行者，常以麁言譏刺毀訾觸惱，無恭敬心，是名於梵行者不斷心弊惡。問曰：此心弊惡，體性是何？答曰：此心弊惡有二分，所謂疑與瞋恚，四是疑分，一是瞋恚。問曰：瞋恚是弊惡，是事可爾。所以者何？如說：云何瞋恚結？答曰：若心生害、心生弊惡、心生瞋恚，是名瞋恚結。如疑心性非瞋恚，何以說是弊惡？答曰：或有說者，無有法性非瞋恚而與瞋恚相似如疑心者。如所說：疑隱弊心令心堅䩕＝硬【三】【宮】＊䩕【大】＊，硬【宋】【元】【明】【宮】＊䩕硬弊惡，猶如良田不種植時堅䩕硬弊惡，彼亦如是。復有說者，疑隱弊心時尚不能生邪決定，況正決定。如田弊惡猶不生草，何況苗稼。復有說者＋（如）【三】【宮】者【大】，者如【宋】【元】【明】【宮】者者如，瞋恚令自身弊惡，疑心能令自身弊惡亦復如是。如田弊, 宮: ''}
