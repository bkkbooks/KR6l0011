  - {type: variant, offset: 543, length: 91, content: 如來滅後，法勝比丘造《阿毘曇心》四卷。又迦旃延子造《阿毘曇》，有八犍度，凡四十四品。後五百應真造《毘婆沙》重釋八犍度。當且翻＝譯【三】翻【大】，譯【宋】【元】【明】翻譯時大卷一百。太武破沮渠已後，零落收拾得六十卷，後人分之作一百一十卷，唯〔釋〕－【三】釋【大】，〔－〕【宋】【元】【明】釋三犍度在，五犍度失盡＝盡失【三】失盡【大】，盡失【宋】【元】【明】失盡＋（阿毘曇毘婆沙論序）【宋】【元】【宮】盡【大】，盡阿毘曇毘婆沙論序【宋】【元】【宮】盡盡阿毘曇毘婆沙論序盡失, 宮: ''}
