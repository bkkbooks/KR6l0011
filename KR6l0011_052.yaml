body:
  text: 我生已盡者為盡過去生為盡未來生為盡現在生言我生盡耶若盡過去生過去生已滅若盡未來生未來生未至若盡現在生現在生不住答曰應作是説盡三世生所以者何此中言生者是非想非非想處四陰行者於三世中盡明見故能離非想非非想處欲尊者佛陀提婆説曰佛經説牟尼見生盡亦作是問為見過去生未來生現在生盡言生盡耶答曰應作是説見未來生盡所以者何行者修一切梵行苦行盡為止未來生故如人有三厄難一者已受二者今受三者當受已受者受竟今受者忍受當受者若以財物若因親族力作諸方便斷當生者行者亦爾過去不用功已滅現在生當忍受竟未來生以正方便滅永令不生生有多種或説入母胎時名生或説出母胎時名生或説時五陰名生或説不相應行陰少分名生或説非想非非想處四陰名生何處説入母胎時名生者如經説諸家生彼彼處生出現出母胎時名生者如説菩薩已生行於七步説時五陰名生者如説有緣生説不相應行陰名生者如説一剎那頃誰起耶謂生也説非想非非想處四陰名生者如此中説我生已盡梵行已立者為立學道名梵行已立為立無學道名梵行已立答曰已立學道名梵行已立無學道名今立所作已辦者已斷一切煩惱所作事已竟復次畢竟盡一切界畢竟盡一切生畢竟斷一切增長生死法名所作已辦不受後有者是明無生智尊者和須蜜説曰若不斷煩惱不名生盡若斷煩惱名為生盡若不斷煩惱不名梵行已立若斷煩惱名梵行已立若不斷煩惱不名所作已辦若斷煩惱名所作已辦若不斷煩惱名受後有若斷煩惱名不受後有問曰一切阿羅漢不盡得無生智何以故一切經中盡説不受後有耶答曰佛説利根與經相應者然集經法者一切經中皆説復有説者集法諸尊者皆有願智無礙智以觀察之若利根與經相應者説之後有不善誦持經者一切經中皆作是説評曰應作是説一切阿羅漢盡不受後有問曰何等阿羅漢修二種慧何等阿羅漢修三種慧答曰或有阿羅漢心善解脫慧善解脫或有心善解脫慧不善解脫若心善解脫慧善解脫者修三種慧若心善解脫慧不善解脫者修二種慧復次或有以苦智集智盡三界結者或有滅智道智盡三界結者若以苦智集智盡三界結者修三種慧若以滅智道智盡三界結者修二種慧復次或以空苦集無願三昧盡三界結者或以無相道無願三昧盡三界結者若以空苦集無願三昧盡三界結者修三種慧若以無相道無願三昧盡三界結者修二種慧復次或有為定入聖道或有為慧入聖道若為定入聖道者修三種慧如定道慧道定多道慧多道欲可定道欲可慧道鈍根利根緣力因力説亦如是復次或有以定修心以慧得解脫者修二種慧或有以慧修心以定得解脫者修三種慧復次得內心寂靜不得觀慧法或有得內心寂靜亦得觀慧法前者修二種慧後者修三種慧復次若人成就四法甚為希有一親近善知識二從其聞法三內正思惟四如法修行若成就初二種法者修二種慧若成就後二種法者修三種慧復次或有從他聞法多或有內正思惟多若從他聞法多者修二種慧若內正思惟多者修三種慧或有無貪善根多或有無癡善根多若無貪善根多者修二種慧若無癡善根多者修三種慧我生已盡是説盡智梵行已立所作已辦不受後有是説無生智復有説者我生已盡梵行已立是説盡智所作已辦不受後有是説無生智復次我生已盡梵行已立所作已辦是説盡智不受後有是説無生智問曰無有阿羅漢二盡智剎那後起無生智者何況多何故作是説言我生已盡梵行已立所作已辦是盡智耶答曰雖是一剎那而有三種義故作是説尊者波奢説曰如是説者不説盡智不説無生智亦不説無學正見此是讚歎阿羅漢辭言阿羅漢生已盡梵行已立所作已辦不受後有復次我生已盡是説盡智梵行已立是説道智所作已辦是説滅智不受後有是説無生智復次我生已盡是説知集梵行已立是説知道所作已辦是説知滅不受後有是説知苦説盡作證亦如是復次我生已盡是説斷集梵行已立是説修道所作已辦是説證滅不受後有是説知苦復次我生已盡是説斷因梵行已立是説修道所作已辦是説得果不受後有是説知體復次我生已盡是説集智梵行已立是説道智所作已辦是説滅智不受後有是説苦智復次我生已盡是説集無願梵行已立是説道無願所作已辦是説無相不受後有是説空及苦無願問曰何故名盡智為以緣盡故名盡智為以煩惱盡身中生故名盡智耶若以緣盡故名盡智者滅智應是盡智若以煩惱盡身中生名盡智者無生智無學正見亦應是盡智答曰應作是説煩惱盡身中生故名盡智問曰若然者無生智無學正見應是盡智答曰若智在初一切皆有者名盡智無學正見雖一切皆有而不在初無生智不在初亦非一切皆有盡智在初一切皆有故問曰十六聖行外更有無漏慧不此中問答廣説如雜揵度云何學明云何學智云何無學明云何無學智問曰何故作此論答曰世間以種種世俗諸論以為明想不識真明欲止如是説者意亦明真明義故而作此論復有説所以作此論者此是佛經經説佛告居士如汝以學智學見學明見四聖諦今此耶奢童子亦以無學智無學見無學明見四聖諦不復更住居士家受五欲樂佛經雖作是説而不廣分別佛經是此論所為根本今欲廣分別故而作此論云何學明答曰學慧是也云何學智答曰學八智是也云何無學明答曰無學慧是也云何無學智答曰無學八智是也謂四法智四比智此是明體性乃至廣説所以今當説何故名明明是何義答曰覺識了了義是明義問曰若覺識了了義是明義者善有漏慧亦覺識了了是明義耶答曰若於四真諦覺識了了畢竟了了更不生顛倒廣説如雜揵度問曰若善有漏慧不名明者佛經云何通如説無學有三種明無學念前世智證明無學生死智證明無學漏盡智證明答曰有少分明勢故名明何者是少分明與煩惱相違亦不雜煩惱故名少分明復次此二明能生能隨順實義無漏明故名明是故尊者和須蜜作如是説第一實義無漏明者是漏盡明餘二明能生此明故名明復次念前世智證明知前際增長法生死智證明知後際增長法漏盡智證明知涅槃寂靜法尊者佛陀提婆亦作是説念前世智證明知此衆生從彼處沒來生此間過去世因果相續法生死智證明知此衆生作如是業當生彼處未來因果相續法漏盡智證明知此衆生以如是道能盡漏因果畢竟法是名第一實義明復次念前世智證明覺識了了過去世事生死智證明覺識了了未來世事漏盡智證明覺識了了無為涅槃復次念前世智證明除過去無知黑暗生死智證明除未來無知黑暗漏盡智證明除於涅槃無知黑暗問曰何故六通中三立明三不立明耶答曰身通是工巧法天耳通聞聲而已他心智通緣別相法此三明能隨順厭離法能棄生死隨順善法能到涅槃問曰此三明云何能隨順厭離法能棄生死隨順善法能到涅槃耶答曰念前世智證明見過去世事生大厭離生死智證明見未來世事生大厭離以厭離故漏盡智證明能作正觀斷於煩惱復次念前世智證明知過去相續種種諸因生死智證明見諸衆生未來陰如散微塵生大厭離故漏盡智證明能作正觀斷於煩惱復次念前世智證明知過去自身衰惱事生大厭離生死智證明見未來他身衰惱事生大厭離以厭離故漏盡智證明能作正觀斷於煩惱復次念前世智證明除於有愚生死智證明除衆生愚漏盡智證明除於法愚復次念前世智證明對治常見生死智證明對治斷見漏盡智證明對治二邊住於中道復次念前世智證明能生空生死智證明能生無願漏盡智證明能生無相以如是等義故此三明隨順厭離之法能棄生死隨順善法到於涅槃集法經説有三種無學明謂念前世智證明生死智證明漏盡智證明云何無學念前世智證明答言知諸衆生生死為相續法無學智云何無學生死智證明答言知諸衆生自所作業無學智云何無學漏盡智證明答言盡漏無學智問曰漏盡智證明言是無學可爾餘二明是非學非無學何故説是無學明耶答曰集法經應作是説無學人有三明而不説者有何意耶答曰二明雖是非學非無學以是無學人身中可得故亦名無學如施設經説三昧有二種一是聖二非是聖聖三昧有三種一善有漏二無漏三不隱沒無記善有漏三昧以善故名聖不以無漏無漏三昧以善故以無漏故名聖不隱沒無記三昧亦非善亦非無漏而名聖者以是聖人身中可得故名聖彼亦如是問曰何故無學人身中立明學人身中不立明耶答曰以明義勝故若以法而言無學法勝於學法若以人而言無學人勝於學人復次不雜無明故名明學人身中慧雜無明故不名明如來身中所有漏盡智有四事一名通二名明三名力四名示現通者是漏盡通明者是漏盡明力者是漏盡力示現者是説法示現辟支佛無學聲聞所有漏盡智有三事一是漏盡通二是漏盡明三是示現非力如來身中所有念前世智生死智有三事一是通二是明三是力非示現辟支佛無學聲聞所有念前世智生死智有二事是通是明非力非示現學人身中所有念前世智生死智有一事謂是通非明非力非示現問曰如來身中所有智立力非辟支佛聲聞身中智耶答曰無障礙義是力義聲聞辟支佛智為無智所障礙故非力曾聞佛世尊尊者舍利弗共一處經行有一衆生來詣其所佛告舍利弗汝可觀是衆生過去世中何處與是衆生而共同止時尊者舍利弗即以初禪念前世智觀不知乃至以第四禪念前世智觀亦不知即從定起而白佛言我觀是衆生都不能見所從來處佛告舍利弗辟支佛所有智見過於汝等復過辟支佛所有智見此衆生從某世界來生此間後時世尊與舍利弗復在一處經行時有一人命終世尊見已告舍利弗言汝可觀是人為生何處時尊者舍利弗即以初禪天眼觀之而不能見乃至起第四禪天眼觀之亦不能見即從定起而白佛言我以天眼觀察是人不知為生何處佛告舍利弗過辟支佛所知境界有某國土此人生於彼中問曰如來所有念前世智生死智勝妙可爾如佛漏盡智聲聞辟支佛亦爾何故佛漏盡智立力非聲聞辟支佛耶答曰佛漏盡智亦勝妙如來身中所有漏盡智其性猛利若緣煩惱煩惱即斷聲聞辟支佛漏盡智不猛利故數數緣煩惱煩惱乃斷譬如二人斫樹一人勇健加用利斧一人性劣又用鈍斧雖俱斫樹而勇健以利斧者疾非性劣以鈍斧斫者彼亦如是非以自身所有漏盡智名為力令彼衆生得漏盡故名力世尊知此衆生以苦遲通能盡漏此衆生以樂速通能盡漏是故名力
